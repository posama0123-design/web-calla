<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>電話 - 050固定番号</title>
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #ffffff; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        
        /* 近接センサー用ブラックアウト */
        #proximity-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; }
        #bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: -1; opacity: 0; transition: opacity 0.8s ease; }

        .phone-container { width: 350px; height: 650px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; padding: 40px 20px; position: relative; z-index: 10; }
        .display-number { font-size: 32px; font-weight: 300; margin: 0; min-height: 50px; letter-spacing: 1px; }
        .status { font-size: 14px; color: #007aff; margin-top: 5px; height: 20px; font-weight: 500; }
        
        /* 着信画面オーバーレイ */
        #incoming-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.95); z-index: 100; display: none;
            flex-direction: column; justify-content: space-around; align-items: center;
        }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .key { width: 75px; height: 75px; background: #f2f2f7; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        .key:active { background: #d1d1d6; }

        /* ボタンデザイン */
        .btn-round { width: 75px; height: 75px; border-radius: 50%; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .btn-call { background: #28a745; }
        .btn-hangup { background: #ff3b30; }
        .btn-decline { background: #ff3b30; }
        
        .in-call-grid { display: none; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-top: 50px; }
        .in-call-active { color: #fff !important; }
        
        #my-number-info { font-size: 12px; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="proximity-mask"></div>
<div id="bg-overlay"></div>

<div id="incoming-overlay">
    <div>
        <div style="font-size: 14px; color: #888;">着信中...</div>
        <div id="caller-id" style="font-size: 28px; margin-top: 10px;">050-XXXX-XXXX</div>
    </div>
    <div style="display: flex; gap: 50px;">
        <div onclick="hangup()" style="text-align: center; cursor: pointer;">
            <div class="btn-round btn-decline"><svg width="30" fill="white" viewBox="0 0 24 24"><path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></svg></div>
            <div style="font-size: 12px; margin-top: 8px;">拒否</div>
        </div>
        <div onclick="acceptCall()" style="text-align: center; cursor: pointer;">
            <div class="btn-round btn-call"><svg width="30" fill="white" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg></div>
            <div style="font-size: 12px; margin-top: 8px;">応答</div>
        </div>
    </div>
</div>

<div class="phone-container" id="mainContainer">
    <div class="display-area">
        <div id="my-number-info">読込中...</div>
        <div class="display-number" id="numberDisplay"></div>
        <div class="status" id="status">準備中...</div>
    </div>

    <div id="dialerUI">
        <div class="keypad">
            <div class="key" onclick="press('1')"><div style="font-size:30px">1</div></div>
            <div class="key" onclick="press('2')"><div style="font-size:30px">2</div></div>
            <div class="key" onclick="press('3')"><div style="font-size:30px">3</div></div>
            <div class="key" onclick="press('4')"><div style="font-size:30px">4</div></div>
            <div class="key" onclick="press('5')"><div style="font-size:30px">5</div></div>
            <div class="key" onclick="press('6')"><div style="font-size:30px">6</div></div>
            <div class="key" onclick="press('7')"><div style="font-size:30px">7</div></div>
            <div class="key" onclick="press('8')"><div style="font-size:30px">8</div></div>
            <div class="key" onclick="press('9')"><div style="font-size:30px">9</div></div>
            <div class="key" onclick="press('*')"><div style="font-size:30px">*</div></div>
            <div class="key" onclick="press('0')"><div style="font-size:30px">0</div></div>
            <div class="key" onclick="press('#')"><div style="font-size:30px">#</div></div>
        </div>
    </div>

    <div class="in-call-grid" id="inCallUI">
        <div style="color:#fff">通話中...</div>
    </div>

    <div class="bottom-controls">
        <button class="btn-round btn-call" id="callBtn" onclick="initiateCall()"></button>
        <button class="btn-round btn-hangup" id="hangupBtn" style="display:none;" onclick="hangup()"></button>
    </div>

    <audio id="remoteAudio" autoplay playsinline></audio>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBaMe4Cz_3W75F5NCtioAguONgukg3-k0g", authDomain: "my-call-14d70.firebaseapp.com", projectId: "my-call-14d70", storageBucket: "my-call-14d70.firebasestorage.app", messagingSenderId: "769393584037", appId: "1:769393584037:web:279aa04477f2649230ea4c" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    let MY_NUMBER = "";
    let pc, localStream, incomingData = null;
    let inCall = false;

    const display = document.getElementById('numberDisplay');
    const statusEl = document.getElementById('status');
    const incomingOverlay = document.getElementById('incoming-overlay');
    const remoteAudio = document.getElementById('remoteAudio');

    window.onload = async () => {
        MY_NUMBER = localStorage.getItem('my_fixed_050_number') || "050-" + Math.floor(1000+Math.random()*9000) + "-" + Math.floor(1000+Math.random()*9000);
        localStorage.setItem('my_fixed_050_number', MY_NUMBER);
        document.getElementById('my-number-info').innerText = "マイ番号: " + MY_NUMBER;
        
        localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true } });
        startWaiting();
    };

    // 待機中：自分宛のOffer（着信）を監視
    function startWaiting() {
        db.collection('rooms').doc(MY_NUMBER).onSnapshot(async snap => {
            const data = snap.data();
            if (data?.offer && !inCall) {
                // 着信画面を表示
                incomingData = data.offer;
                document.getElementById('caller-id').innerText = data.caller || "非通知";
                incomingOverlay.style.display = 'flex';
                // ここで着信音を鳴らすなどの処理も可能
            }
            if (!snap.exists && inCall) hangup();
        });
    }

    // 応答ボタンを押したとき
    async function acceptCall() {
        inCall = true;
        incomingOverlay.style.display = 'none';
        
        // センサーの許可（iOS対策）
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            await DeviceOrientationEvent.requestPermission();
        }
        startSensor();

        createPC();
        await pc.setRemoteDescription(new RTCSessionDescription(incomingData));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        await db.collection('rooms').doc(MY_NUMBER).update({ answer });
        
        showInCallUI();
    }

    // 自分から発信するとき
    async function initiateCall() {
        const target = display.innerText;
        if (!target) return;
        inCall = true;
        
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            await DeviceOrientationEvent.requestPermission();
        }
        startSensor();

        createPC();
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        await db.collection('rooms').doc(target).set({ offer, caller: MY_NUMBER });

        // 相手の応答を待つ
        db.collection('rooms').doc(target).onSnapshot(async snap => {
            const data = snap.data();
            if (data?.answer && !pc.currentRemoteDescription) {
                await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                showInCallUI();
            }
        });
    }

    function createPC() {
        pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        pc.ontrack = e => { 
            remoteAudio.srcObject = e.streams[0];
            remoteAudio.volume = 0.5; // 最初は音量を抑える（受話器モード想定）
        };
    }

    function startSensor() {
        window.addEventListener('deviceorientation', e => {
            if (!inCall) return;
            const isNear = Math.abs(e.beta) > 75; // スマホを耳に当てた角度
            document.getElementById('proximity-mask').style.display = isNear ? 'block' : 'none';
            remoteAudio.volume = isNear ? 1.0 : 0.4; // 耳に当てているときだけ音量を上げる
        });
    }

    function showInCallUI() {
        document.getElementById('dialerUI').style.display = 'none';
        document.getElementById('callBtn').style.display = 'none';
        document.getElementById('hangupBtn').style.display = 'flex';
        document.getElementById('bg-overlay').style.opacity = '1';
        statusEl.innerText = "通話中";
    }

    function hangup() { location.reload(); }

    function press(n) { display.innerText += n; }
</script>
</body>
</html>
