<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IP-callservice</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-green: #4cd964;
            --ios-red: #ff3b30;
            --bg-light: #f2f2f7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: #fff; height: 100vh; overflow: hidden; }

        /* --- Status Bar --- */
        .status-bar { height: 24px; padding: 0 10px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: bold; }
        .battery { border: 1px solid #000; width: 20px; height: 10px; position: relative; border-radius: 2px; }
        .battery::after { content: ''; position: absolute; left: 0; top: 0; width: 6%; height: 100%; background: #000; }

        /* --- Screens --- */
        #main-container { height: 100vh; display: flex; flex-direction: column; }
        .view-content { flex-grow: 1; display: none; flex-direction: column; }
        .active-view { display: flex; }

        /* --- Keypad --- */
        #dial-display { height: 100px; display: flex; align-items: center; justify-content: center; font-size: 38px; letter-spacing: 1px; }
        .keypad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px 30px; padding: 0 45px; }
        .key { width: 75px; height: 75px; background: #e5e5e5; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 32px; cursor: pointer; transition: background 0.1s; }
        .key:active { background: #bbb; }
        .key small { font-size: 10px; font-weight: bold; margin-top: -5px; }

        .call-btn-container { display: flex; justify-content: center; padding: 30px 0; }
        .btn-call { width: 75px; height: 75px; background: var(--ios-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* --- Contacts --- */
        .header-title { text-align: center; font-size: 18px; padding: 15px; border-bottom: 1px solid #ccc; font-weight: 600; }
        .contact-item { padding: 12px 20px; border-bottom: 0.5px solid #d1d1d1; font-size: 18px; background: #fff; }

        /* --- Tab Bar --- */
        .tab-bar { height: 60px; border-top: 1px solid #ccc; display: flex; justify-content: space-around; align-items: center; background: #f9f9f9; }
        .tab { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #8e8e93; cursor: pointer; }
        .tab.active { color: var(--ios-blue); }

        /* --- CSS Icons --- */
        .icon { width: 25px; height: 25px; margin-bottom: 4px; position: relative; }
        .icon-star { background: currentColor; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
        .icon-clock { border: 2px solid currentColor; border-radius: 50%; }
        .icon-clock::after { content:''; position:absolute; width:2px; height:8px; background:currentColor; left:10px; top:3px; }
        .icon-user { background: currentColor; border-radius: 50% 50% 0 0; width: 16px; height: 7px; position: absolute; bottom: 2px; left: 4.5px; }
        .icon-user::before { content:''; position:absolute; width:10px; height:10px; background:currentColor; border-radius:50%; top:-11px; left:3px; }
        .icon-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 4px; }
        .icon-grid span { width: 5px; height: 5px; background: currentColor; border-radius: 50%; }
        .icon-tape { width: 22px; height: 11px; border: 2px solid currentColor; border-radius: 10px; top: 6px; }
        .icon-tape::after, .icon-tape::before { content:''; position:absolute; width:5px; height:5px; border:2px solid currentColor; border-radius:50%; top:1px; }
        .icon-tape::before { left: 2px; } .icon-tape::after { right: 2px; }
        .icon-phone-white { width: 30px; height: 30px; background: white; clip-path: polygon(25% 5%, 40% 30%, 30% 40%, 60% 70%, 70% 60%, 95% 75%, 85% 95%, 50% 95%, 5% 50%, 5% 15%); }

        /* --- Incoming Call UI --- */
        #incoming-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #4a5a6a 0%, #000 100%);
            z-index: 9999; display: none; flex-direction: column; align-items: center; color: white;
        }
        .incoming-info { margin-top: 80px; text-align: center; }
        .incoming-info h1 { font-size: 32px; font-weight: 300; margin-bottom: 8px; }
        .incoming-info p { font-size: 16px; opacity: 0.8; }

        .slider-area { margin-bottom: 100px; width: 280px; height: 80px; background: rgba(255,255,255,0.15); border-radius: 40px; position: relative; display: flex; align-items: center; }
        .slider-text { width: 100%; text-align: center; font-size: 18px; opacity: 0.6; }
        .slider-knob {
            position: absolute; left: 5px; width: 70px; height: 70px; background: var(--ios-green);
            border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        /* --- Ongoing Call UI --- */
        #calling-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; z-index: 10000; display: none; flex-direction: column; align-items: center; color: white;
        }
        .btn-hangup { width: 75px; height: 75px; background: var(--ios-red); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: 50px; transform: rotate(135deg); cursor: pointer; }

    </style>
</head>
<body>

<div id="main-container">
    <div class="status-bar">
        <div>SIMなし ●●●○○</div>
        <div>14:34</div>
        <div style="display:flex; align-items:center;">6% <div class="battery"></div></div>
    </div>

    <div style="text-align: center; font-size: 11px; color: var(--ios-blue); padding: 4px; background: #eee;" id="display-my-num">
        マイ番号: 発行中...
    </div>

    <div id="view-keypad" class="view-content active-view">
        <div id="dial-display"></div>
        <div class="keypad-grid">
            <div class="key" onclick="press('1')">1<small>&nbsp;</small></div>
            <div class="key" onclick="press('2')">2<small>A B C</small></div>
            <div class="key" onclick="press('3')">3<small>D E F</small></div>
            <div class="key" onclick="press('4')">4<small>G H I</small></div>
            <div class="key" onclick="press('5')">5<small>J K L</small></div>
            <div class="key" onclick="press('6')">6<small>M N O</small></div>
            <div class="key" onclick="press('7')">7<small>P Q R S</small></div>
            <div class="key" onclick="press('8')">8<small>T U V</small></div>
            <div class="key" onclick="press('9')">9<small>W X Y Z</small></div>
            <div class="key" onclick="press('*')">*<small>&nbsp;</small></div>
            <div class="key" onclick="press('0')">0<small>+</small></div>
            <div class="key" onclick="press('#')">#<small>&nbsp;</small></div>
        </div>
        <div class="call-btn-container">
            <div class="btn-call" onclick="startCall()"><div class="icon-phone-white"></div></div>
        </div>
    </div>

    <div id="view-contacts" class="view-content">
        <div class="header-title">すべての連絡先 <span style="float:right; color:var(--ios-blue); margin-right:15px;" onclick="addContact()">+</span></div>
        <div id="contact-list" style="overflow-y: auto;">
            <div style="text-align:center; padding:50px; color:#999;">連絡先なし</div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab" onclick="switchTab('favorites')"><div class="icon icon-star"></div>よく使う項目</div>
        <div class="tab" onclick="switchTab('history')"><div class="icon icon-clock"></div>履歴</div>
        <div class="tab" onclick="switchTab('contacts')" id="tab-contacts"><div class="icon icon-user"></div>連絡先</div>
        <div class="tab active" onclick="switchTab('keypad')" id="tab-keypad"><div class="icon icon-grid"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>キーパッド</div>
        <div class="tab" onclick="switchTab('voicemail')"><div class="icon icon-tape"></div>留守番電話</div>
    </div>
</div>

<div id="incoming-screen">
    <div class="incoming-info">
        <h1 id="caller-number">090-XXXX-XXXX</h1>
        <p>携帯電話</p>
    </div>
    <div style="flex-grow: 1;"></div>
    <div class="slider-area">
        <div class="slider-text">スライドで応答</div>
        <div class="slider-knob" id="knob"><div class="icon-phone-white"></div></div>
    </div>
</div>

<div id="calling-screen">
    <div class="incoming-info">
        <h1 id="talking-number">090-XXXX-XXXX</h1>
        <p id="call-status">発信中...</p>
    </div>
    <div style="flex-grow: 1;"></div>
    <div class="btn-hangup" onclick="hangUp()"><div class="icon-phone-white"></div></div>
    <div style="height: 100px;"></div>
</div>

<audio id="snd-ding" src="ding.mp3"></audio>
<audio id="snd-ring" src="telephone.mp3" loop></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, onChildAdded } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBaMe4Cz_3W75F5NCtioAguONgukg3-k0g",
        authDomain: "my-call-14d70.firebaseapp.com",
        databaseURL: "https://my-call-14d70-default-rtdb.firebaseio.com",
        projectId: "my-call-14d70",
        storageBucket: "my-call-14d70.firebasestorage.app",
        messagingSenderId: "769393584037",
        appId: "1:769393584037:web:279aa04477f2649230ea4c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- My Number Logic ---
    let myNum = localStorage.getItem('fixed_num');
    if(!myNum) {
        const heads = ['090', '080', '070', '060'];
        const rand = () => Math.floor(Math.random() * 9000 + 1000);
        myNum = `${heads[Math.floor(Math.random()*4)]}-${rand()}-${rand()}`;
        localStorage.setItem('fixed_num', myNum);
    }
    document.getElementById('display-my-num').innerText = `あなたの番号: ${myNum}`;
    const myId = myNum.replace(/-/g, '');

    // --- DTMF Sounds (Natural Tone) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const dtmfFreqs = {
        '1': [697, 1209], '2': [697, 1336], '3': [697, 1477],
        '4': [770, 1209], '5': [770, 1336], '6': [770, 1477],
        '7': [852, 1209], '8': [852, 1336], '9': [852, 1477],
        '*': [941, 1209], '0': [941, 1336], '#': [941, 1477]
    };

    function playTone(digit) {
        const freqs = dtmfFreqs[digit];
        if(!freqs) return;
        const o1 = audioCtx.createOscillator();
        const o2 = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o1.frequency.value = freqs[0]; o2.frequency.value = freqs[1];
        g.gain.value = 0.1;
        o1.connect(g); o2.connect(g); g.connect(audioCtx.destination);
        o1.start(); o2.start();
        setTimeout(() => { o1.stop(); o2.stop(); }, 150);
    }

    // --- Dialing ---
    let dialStr = "";
    window.press = (n) => {
        if(dialStr.length < 13) {
            dialStr += n;
            if(dialStr.length === 3 || dialStr.length === 8) dialStr += "-";
            document.getElementById('dial-display').innerText = dialStr;
            playTone(n);
        }
    };

    // --- Call Logic ---
    window.startCall = () => {
        if(dialStr.length < 11) return;
        const targetId = dialStr.replace(/-/g, '');
        document.getElementById('snd-ding').play();
        
        // シグナリング送信
        set(ref(db, `calls/${targetId}`), { from: myNum, type: 'offer' });
        
        document.getElementById('talking-number').innerText = dialStr;
        document.getElementById('calling-screen').style.display = 'flex';
    };

    window.hangUp = () => {
        remove(ref(db, `calls/${myId}`));
        const targetId = dialStr.replace(/-/g, '');
        remove(ref(db, `calls/${targetId}`));
        
        document.getElementById('calling-screen').style.display = 'none';
        document.getElementById('incoming-screen').style.display = 'none';
        document.getElementById('snd-ring').pause();
        dialStr = "";
        document.getElementById('dial-display').innerText = "";
    };

    // --- Incoming Watch ---
    onValue(ref(db, `calls/${myId}`), (snapshot) => {
        const data = snapshot.val();
        if(data && data.type === 'offer') {
            document.getElementById('caller-number').innerText = data.from;
            document.getElementById('incoming-screen').style.display = 'flex';
            document.getElementById('snd-ring').play();
        } else if(!data) {
            document.getElementById('incoming-screen').style.display = 'none';
            document.getElementById('snd-ring').pause();
        }
    });

    // --- Slider Logic ---
    const knob = document.getElementById('knob');
    let startX = 0;
    const handleStart = (e) => { startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX; };
    const handleMove = (e) => {
        if(startX === 0) return;
        const currentX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
        let delta = currentX - startX;
        if(delta < 0) delta = 0;
        if(delta > 200) { // スライド完了
            delta = 200;
            answer();
        }
        knob.style.left = (delta + 5) + 'px';
    };
    const handleEnd = () => {
        if(parseInt(knob.style.left) < 180) knob.style.left = '5px';
        startX = 0;
    };
    knob.addEventListener('mousedown', handleStart);
    knob.addEventListener('touchstart', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', handleMove);
    window.addEventListener('mouseup', handleEnd);
    window.addEventListener('touchend', handleEnd);

    function answer() {
        document.getElementById('snd-ring').pause();
        document.getElementById('incoming-screen').style.display = 'none';
        document.getElementById('talking-number').innerText = document.getElementById('caller-number').innerText;
        document.getElementById('call-status').innerText = "通話中...";
        document.getElementById('calling-screen').style.display = 'flex';
    }

    // --- Contacts Store ---
    let contacts = JSON.parse(localStorage.getItem('ip_contacts') || '[]');
    window.addContact = () => {
        const name = prompt("名前を入力してください:");
        if(name) {
            contacts.push({name});
            localStorage.setItem('ip_contacts', JSON.stringify(contacts));
            renderContacts();
        }
    };
    function renderContacts() {
        const list = document.getElementById('contact-list');
        if(contacts.length === 0) return;
        list.innerHTML = contacts.map(c => `<div class="contact-item">${c.name}</div>`).join('');
    }

    // --- Navigation ---
    window.switchTab = (target) => {
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active-view'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if(target === 'keypad') {
            document.getElementById('view-keypad').classList.add('active-view');
            document.getElementById('tab-keypad').classList.add('active');
        } else if(target === 'contacts') {
            document.getElementById('view-contacts').classList.add('active-view');
            document.getElementById('tab-contacts').classList.add('active');
            renderContacts();
        }
    };
</script>
</body>
</html>
