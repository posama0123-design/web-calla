<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGM Style Feature Phone</title>
    <style>
        :root {
            --phone-bg: #1a1a1a;
            --screen-bg: #4a4a4a;
            --key-bg: #333;
            --text-color: #eee;
        }

        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            user-select: none;
        }

        /* 筐体 */
        .phone-body {
            width: 280px;
            background: var(--phone-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 4px solid #333;
            position: relative;
        }

        /* ディスプレイ部分 */
        .screen-container {
            width: 100%;
            height: 200px;
            background: var(--screen-bg);
            border: 8px solid #222;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
            pointer-events: none; /* 画面タッチ無効 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .screen-content {
            text-align: center;
            color: white;
            width: 100%;
        }

        .call-icons {
            display: flex;
            justify-content: space-around;
            width: 80%;
            margin-top: 20px;
        }

        .avatar-box, .call-box {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .avatar-box { background: #666; }
        .call-box { background: #00ff00; }

        #numberDisplay {
            font-size: 20px;
            margin-bottom: 5px;
            min-height: 24px;
        }

        #status {
            font-size: 12px;
            color: #ddd;
        }

        .brand-logo {
            text-align: center;
            color: #f1c40f;
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* キーパッド */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .key {
            background: var(--key-bg);
            color: white;
            border-radius: 8px;
            padding: 10px 0;
            text-align: center;
            cursor: pointer;
            border-bottom: 3px solid #000;
            transition: transform 0.05s;
        }

        .key:active {
            transform: translateY(2px);
            background: #444;
        }

        .key .num { font-size: 18px; font-weight: bold; display: block; }
        .key .abc { font-size: 8px; color: #aaa; text-transform: uppercase; }

        /* 特殊ボタン */
        .key.call-green { color: #2ecc71; }
        .key.hangup-red { color: #e74c3c; }
        
        .nav-keys {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .center-key {
            border: 2px solid #555;
            background: #222;
        }

        #my-number-info {
            position: absolute;
            top: 5px;
            width: 100%;
            font-size: 9px;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="phone-body">
    <div class="brand-logo">AGM MOBILE</div>
    
    <div class="screen-container">
        <div id="my-number-info">読込中...</div>
        <div class="screen-content">
            <div id="numberDisplay"></div>
            <div id="status">待受中...</div>
            
            <div class="call-icons">
                <div class="avatar-box">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="black"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
                <div class="call-box" id="callStatusBox">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                </div>
            </div>
        </div>
    </div>

    <div class="nav-keys">
        <div class="key call-green" onclick="handleCallBtn()">
            <span class="num">📞</span>
        </div>
        <div class="key center-key">
            <span class="abc">OK</span>
        </div>
        <div class="key hangup-red" onclick="hangup()">
            <span class="num">━</span>
        </div>
    </div>

    <div class="keypad">
        <div class="key" onclick="press('1')"><span class="num">1</span><span class="abc">&nbsp;</span></div>
        <div class="key" onclick="press('2')"><span class="num">2</span><span class="abc">ABC</span></div>
        <div class="key" onclick="press('3')"><span class="num">3</span><span class="abc">DEF</span></div>
        <div class="key" onclick="press('4')"><span class="num">4</span><span class="abc">GHI</span></div>
        <div class="key" onclick="press('5')"><span class="num">5</span><span class="abc">JKL</span></div>
        <div class="key" onclick="press('6')"><span class="num">6</span><span class="abc">MNO</span></div>
        <div class="key" onclick="press('7')"><span class="num">7</span><span class="abc">PQRS</span></div>
        <div class="key" onclick="press('8')"><span class="num">8</span><span class="abc">TUV</span></div>
        <div class="key" onclick="press('9')"><span class="num">9</span><span class="abc">WXYZ</span></div>
        <div class="key" onclick="press('*')"><span class="num">*</span><span class="abc"></span></div>
        <div class="key" onclick="press('0')"><span class="num">0</span><span class="abc">+</span></div>
        <div class="key" onclick="backspace()"><span class="num">#</span><span class="abc">Clear</span></div>
    </div>
</div>

<audio id="remoteAudio" autoplay></audio>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

<script>
    // Firebase 設定
    const firebaseConfig = { 
        apiKey: "AIzaSyBaMe4Cz_3W75F5NCtioAguONgukg3-k0g", 
        authDomain: "my-call-14d70.firebaseapp.com", 
        projectId: "my-call-14d70", 
        storageBucket: "my-call-14d70.firebasestorage.app", 
        messagingSenderId: "769393584037", 
        appId: "1:769393584037:web:279aa04477f2649230ea4c" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let MY_NUMBER = "";
    let currentRoomId = "";
    let localStream, pc, timerInterval, unsubscribeRoom;
    let isCalling = false;

    const display = document.getElementById('numberDisplay');
    const statusEl = document.getElementById('status');
    const myNumInfo = document.getElementById('my-number-info');
    const remoteAudio = document.getElementById('remoteAudio');

    window.onload = async () => {
        let saved = localStorage.getItem('my_fixed_080_number');
        if (!saved) {
            saved = "080-" + Math.floor(1000+Math.random()*9000) + "-" + Math.floor(1000+Math.random()*9000);
            localStorage.setItem('my_fixed_080_number', saved);
        }
        MY_NUMBER = saved;
        myNumInfo.innerText = "My: " + MY_NUMBER;

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            statusEl.innerText = "待受中...";
            autoStartWaiting();
        } catch (e) { statusEl.innerText = "マイク未許可"; }
    };

    function press(num) {
        if (isCalling) return;
        let current = display.innerText.replace(/-/g, "");
        if (current.length >= 11) return;
        current += num;
        display.innerText = formatNumber(current);
    }

    function formatNumber(num) {
        if (num.length > 7) return num.slice(0, 3) + "-" + num.slice(3, 7) + "-" + num.slice(7);
        if (num.length > 3) return num.slice(0, 3) + "-" + num.slice(3);
        return num;
    }

    function backspace() {
        if (isCalling) return;
        let current = display.innerText.replace(/-/g, "").slice(0, -1);
        display.innerText = formatNumber(current);
    }

    function handleCallBtn() {
        if (!isCalling) call();
    }

    // --- WebRTC Logic ---

    async function autoStartWaiting() {
        const roomRef = db.collection('rooms').doc(MY_NUMBER);
        createPC();
        watchRoom(MY_NUMBER);
        pc.onicecandidate = e => e.candidate && roomRef.collection('callerCandidates').add(e.candidate.toJSON());
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        await roomRef.set({ offer: { type: offer.type, sdp: offer.sdp } });
        roomRef.onSnapshot(async snap => {
            const data = snap.data();
            if (!pc.currentRemoteDescription && data?.answer) await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
        });
        roomRef.collection('calleeCandidates').onSnapshot(snap => {
            snap.docChanges().forEach(change => { if (change.type === 'added') pc.addIceCandidate(new RTCIceCandidate(change.doc.data())); });
        });
    }

    async function call() {
        const targetId = display.innerText;
        if (targetId.length < 1) return;
        isCalling = true;
        statusEl.innerText = "発信中...";
        const roomRef = db.collection('rooms').doc(targetId);
        const roomSnapshot = await roomRef.get();
        if (!roomSnapshot.exists) { playGuidance(); return; }
        
        watchRoom(targetId);
        createPC();
        pc.onicecandidate = e => e.candidate && roomRef.collection('calleeCandidates').add(e.candidate.toJSON());
        const data = roomSnapshot.data();
        await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        await roomRef.update({ answer: { type: answer.type, sdp: answer.sdp } });
        roomRef.collection('callerCandidates').onSnapshot(snap => {
            snap.docChanges().forEach(change => { if (change.type === 'added') pc.addIceCandidate(new RTCIceCandidate(change.doc.data())); });
        });
    }

    function createPC() {
        pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        pc.ontrack = e => { remoteAudio.srcObject = e.streams[0]; };
        if (localStream) localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        pc.onconnectionstatechange = () => {
            if (pc.connectionState === 'connected') startTimer();
        };
    }

    function watchRoom(roomId) {
        currentRoomId = roomId;
        unsubscribeRoom = db.collection('rooms').doc(roomId).onSnapshot(snap => {
            if (!snap.exists && pc) hangup(false);
        });
    }

    async function hangup(cleanUpDb = true) {
        speechSynthesis.cancel();
        if (unsubscribeRoom) unsubscribeRoom();
        if (cleanUpDb && currentRoomId) await db.collection('rooms').doc(currentRoomId).delete();
        if (pc) { pc.close(); pc = null; }
        location.reload();
    }

    function startTimer() {
        let sec = 0;
        timerInterval = setInterval(() => {
            sec++;
            const m = String(Math.floor(sec / 60)).padStart(2, '0');
            const s = String(sec % 60).padStart(2, '0');
            statusEl.innerText = `通話中 ${m}:${s}`;
        }, 1000);
    }

    function playGuidance() {
        const uttr = new SpeechSynthesisUtterance("おかけになった電話番号は、現在使われておりません。");
        uttr.lang = "ja-JP";
        speechSynthesis.speak(uttr);
        statusEl.innerText = "接続不可";
        uttr.onend = () => setTimeout(() => hangup(false), 1000);
    }
</script>

</body>
</html>
