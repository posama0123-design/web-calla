<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phone v9</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-green: #4cd964;
            --ios-red: #ff3b30;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
        body { background: #000; height: 100vh; overflow: hidden; display: flex; justify-content: center; }

        #phone-wrapper {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            background: #fff;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* --- Status Bar iOS 9 Style --- */
        .status-bar {
            height: 20px;
            padding: 0 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            background: rgba(255,255,255,0.9);
        }
        .status-left { display: flex; align-items: center; gap: 4px; }
        .antenna { display: flex; gap: 1.5px; align-items: flex-end; height: 10px; margin-right: 2px; }
        .antenna div { width: 3px; height: 3px; background: #000; border-radius: 50%; }
        .antenna div.off { background: #ccc; }
        .carrier { font-weight: 500; }
        .status-center { position: absolute; left: 50%; transform: translateX(-50%); font-weight: 600; }

        /* --- Number View --- */
        #number-view { height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #dial-string { font-size: 44px; font-weight: 200; letter-spacing: 1px; min-height: 50px; }
        .my-num-tag { font-size: 11px; color: var(--ios-blue); margin-top: 5px; }

        /* --- Keypad --- */
        .keypad-container { flex-grow: 1; display: flex; justify-content: center; align-items: flex-start; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px 28px; }
        .key {
            width: 76px; height: 76px; border: 1px solid var(--ios-blue); border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: background 0.1s;
        }
        .key:active { background: rgba(0, 122, 255, 0.2); }
        .key span { font-size: 36px; font-weight: 200; color: #000; line-height: 1; }
        .key small { font-size: 10px; letter-spacing: 1px; font-weight: 400; color: #000; margin-top: -2px; }

        .call-btn-area { padding-bottom: 40px; display: flex; justify-content: center; }
        .call-btn { width: 76px; height: 76px; background: var(--ios-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* --- Tab Bar --- */
        .tab-bar { height: 55px; border-top: 0.5px solid #a7a7aa; display: flex; justify-content: space-around; align-items: center; background: rgba(248,248,248,0.95); }
        .tab { display: flex; flex-direction: column; align-items: center; color: #8e8e93; font-size: 10px; cursor: pointer; }
        .tab.active { color: var(--ios-blue); }

        /* --- CSS Icons --- */
        .icon { width: 24px; height: 24px; position: relative; margin-bottom: 2px; }
        .icon-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 3px; }
        .icon-grid div { width: 5px; height: 5px; background: currentColor; border-radius: 50%; }
        .icon-star { background: currentColor; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
        .icon-clock { border: 1.5px solid currentColor; border-radius: 50%; }
        .icon-clock::after { content:''; position:absolute; width:1.5px; height:7px; background:currentColor; left:10px; top:3px; }
        .icon-user { background: currentColor; border-radius: 50% 50% 0 0; width: 14px; height: 7px; position: absolute; bottom: 2px; left: 5px; }
        .icon-user::before { content:''; position:absolute; width:9px; height:9px; background:currentColor; border-radius:50%; top:-10px; left:2.5px; }
        .icon-tape { width: 20px; height: 10px; border: 1.5px solid currentColor; border-radius: 10px; top: 6px; }
        .icon-tape::after, .icon-tape::before { content:''; position:absolute; width:4px; height:4px; border:1.5px solid currentColor; border-radius:50%; top:1px; }
        .icon-tape::before { left: 2px; } .icon-tape::after { right: 2px; }
        .icon-phone-w { width: 30px; height: 30px; background: white; clip-path: polygon(25% 5%, 40% 30%, 30% 40%, 60% 70%, 70% 60%, 95% 75%, 85% 95%, 50% 95%, 5% 50%, 5% 15%); }

        /* --- Screens --- */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: space-between; color: white; padding: 100px 0; background: linear-gradient(180deg, #2c3e50 0%, #000 100%); }
        .overlay h1 { font-size: 36px; font-weight: 200; }
        .slide-track { width: 280px; height: 80px; background: rgba(255,255,255,0.1); border-radius: 40px; position: relative; display: flex; align-items: center; }
        .knob { position: absolute; left: 5px; width: 70px; height: 70px; background: var(--ios-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        #view-contacts { display: none; flex-grow: 1; background: #fff; }
        .contact-header { text-align: center; font-size: 17px; font-weight: 600; padding: 15px; border-bottom: 0.5px solid #b2b2b2; }
    </style>
</head>
<body onclick="initAudio()">

<div id="phone-wrapper">
    <div class="status-bar">
        <div class="status-left">
            <div class="antenna">
                <div></div><div></div><div></div><div></div><div class="off"></div>
            </div>
            <span class="carrier">JDD</span>
        </div>
        <div class="status-center" id="clock">15:17</div>
        <div class="status-right">
            <span id="lock-icon">🔒</span>
        </div>
    </div>

    <div id="view-keypad" style="display:flex; flex-direction:column; height: 100%;">
        <div id="number-view">
            <div class="my-num-tag" id="my-num-display">番号発行中...</div>
            <div id="dial-string"></div>
        </div>
        <div class="keypad-container">
            <div class="grid">
                <div class="key" onclick="tap('1')"><span>1</span><small>&nbsp;</small></div>
                <div class="key" onclick="tap('2')"><span>2</span><small>A B C</small></div>
                <div class="key" onclick="tap('3')"><span>3</span><small>D E F</small></div>
                <div class="key" onclick="tap('4')"><span>4</span><small>G H I</small></div>
                <div class="key" onclick="tap('5')"><span>5</span><small>J K L</small></div>
                <div class="key" onclick="tap('6')"><span>6</span><small>M N O</small></div>
                <div class="key" onclick="tap('7')"><span>7</span><small>P Q R S</small></div>
                <div class="key" onclick="tap('8')"><span>8</span><small>T U V</small></div>
                <div class="key" onclick="tap('9')"><span>9</span><small>W X Y Z</small></div>
                <div class="key" onclick="tap('*')"><span>*</span><small>&nbsp;</small></div>
                <div class="key" onclick="tap('0')"><span>0</span><small>+</small></div>
                <div class="key" onclick="tap('#')"><span>#</span><small>&nbsp;</small></div>
            </div>
        </div>
        <div class="call-btn-area">
            <div class="call-btn" onclick="makeCall()"><div class="icon-phone-w"></div></div>
        </div>
    </div>

    <div id="view-contacts">
        <div class="contact-header">すべての連絡先</div>
        <div style="text-align:center; padding:50px; color:#999;">連絡先なし</div>
    </div>

    <div class="tab-bar">
        <div class="tab"><div class="icon icon-star"></div>よく使う項目</div>
        <div class="tab"><div class="icon icon-clock"></div>履歴</div>
        <div class="tab" id="t-contact" onclick="switchView('contacts')"><div class="icon icon-user"></div>連絡先</div>
        <div class="tab active" id="t-keypad" onclick="switchView('keypad')"><div class="icon icon-grid"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>キーパッド</div>
        <div class="tab"><div class="icon icon-tape"></div>留守番電話</div>
    </div>

    <div id="incoming-overlay" class="overlay">
        <div style="text-align:center;">
            <h1 id="incoming-from">090-XXXX-XXXX</h1>
            <p>JDD 携帯電話</p>
        </div>
        <div class="slide-track">
            <div class="slide-text" style="opacity:0.6">スライドで応答</div>
            <div class="knob" id="knob"><div class="icon-phone-w"></div></div>
        </div>
    </div>
</div>

<audio id="ding" src="ding.mp3" preload="auto"></audio>
<audio id="ring" src="telephone.mp3" loop preload="auto"></audio>

<script>
    // --- Firebase (Using your config) ---
    const firebaseConfig = {
        apiKey: "AIzaSyBaMe4Cz_3W75F5NCtioAguONgukg3-k0g",
        databaseURL: "https://my-call-14d70-default-rtdb.firebaseio.com",
        projectId: "my-call-14d70",
        appId: "1:769393584037:web:279aa04477f2649230ea4c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- Audio & Media Permissions ---
    let audioInited = false;
    async function initAudio() {
        if(audioInited) return;
        // マイク許可を要求
        try {
            await navigator.mediaDevices.getUserMedia({ audio: true });
            console.log("Microphone access granted");
        } catch (e) {
            console.warn("Microphone access denied or error", e);
        }
        audioInited = true;
    }

    // --- Fixed Number Logic ---
    let myNum = localStorage.getItem('fixed_no_v9');
    if(!myNum) {
        const p = ['090','080','070','060'][Math.floor(Math.random()*4)];
        const r = () => Math.floor(Math.random()*9000+1000);
        myNum = `${p}-${r()}-${r()}`;
        localStorage.setItem('fixed_no_v9', myNum);
    }
    document.getElementById('my-num-display').innerText = `マイ番号: ${myNum}`;
    const myId = myNum.replace(/-/g, '');

    // --- DTMF Tones ---
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const dtmf = {'1':[697,1209],'2':[697,1336],'3':[697,1477],'4':[770,1209],'5':[770,1336],'6':[770,1477],'7':[852,1209],'8':[852,1336],'9':[852,1477],'*':[941,1209],'0':[941,1336],'#':[941,1477]};
    function playTone(d) {
        if(ctx.state === 'suspended') ctx.resume();
        const f = dtmf[d]; if(!f) return;
        const o1 = ctx.createOscillator(); const o2 = ctx.createOscillator(); const g = ctx.createGain();
        o1.frequency.value = f[0]; o2.frequency.value = f[1]; g.gain.value = 0.1;
        o1.connect(g); o2.connect(g); g.connect(ctx.destination);
        o1.start(); o2.start(); setTimeout(()=>{o1.stop(); o2.stop();}, 150);
    }

    // --- Dialing ---
    let dial = "";
    function tap(n) {
        if(dial.length < 13) {
            dial += n;
            if(dial.length === 3 || dial.length === 8) dial += "-";
            document.getElementById('dial-string').innerText = dial;
            playTone(n);
        }
    }

    // --- Call Actions ---
    function makeCall() {
        if(dial.length < 11) return;
        const target = dial.replace(/-/g, '');
        // ding.mp3 再生
        const ding = document.getElementById('ding');
        ding.currentTime = 0;
        ding.play().catch(e => console.error("Audio play failed:", e));

        db.ref('calls/' + target).set({ from: myNum, status: 'ringing' });
        alert(dial + " へ発信中...");
    }

    // --- Incoming Watch ---
    db.ref('calls/' + myId).on('value', snap => {
        const data = snap.val();
        if(data && data.status === 'ringing') {
            document.getElementById('incoming-from').innerText = data.from;
            document.getElementById('incoming-overlay').style.display = 'flex';
            document.getElementById('ring').play().catch(()=>{});
        } else {
            document.getElementById('incoming-overlay').style.display = 'none';
            document.getElementById('ring').pause();
        }
    });

    // --- Slider ---
    const knob = document.getElementById('knob');
    let isDragging = false;
    let startX = 0;
    const onStart = (e) => { isDragging = true; startX = e.touches ? e.touches[0].clientX : e.clientX; };
    const onMove = (e) => {
        if(!isDragging) return;
        const currentX = e.touches ? e.touches[0].clientX : e.clientX;
        let diff = currentX - startX;
        if(diff < 5) diff = 5;
        if(diff > 205) { diff = 205; answer(); isDragging = false; }
        knob.style.left = diff + 'px';
    };
    const onEnd = () => { if(isDragging && parseInt(knob.style.left) < 180) knob.style.left = '5px'; isDragging = false; };
    knob.addEventListener('mousedown', onStart); knob.addEventListener('touchstart', onStart);
    window.addEventListener('mousemove', onMove); window.addEventListener('touchmove', onMove);
    window.addEventListener('mouseup', onEnd); window.addEventListener('touchend', onEnd);

    function answer() {
        document.getElementById('ring').pause();
        alert("通話開始 (JDD Network)");
        db.ref('calls/' + myId).remove();
    }

    // --- Utils ---
    function switchView(v) {
        document.getElementById('view-keypad').style.display = v === 'keypad' ? 'flex' : 'none';
        document.getElementById('view-contacts').style.display = v === 'contacts' ? 'block' : 'none';
        document.getElementById('t-keypad').classList.toggle('active', v === 'keypad');
        document.getElementById('t-contact').classList.toggle('active', v === 'contacts');
    }

    setInterval(() => {
        const n = new Date();
        document.getElementById('clock').innerText = n.getHours() + ":" + String(n.getMinutes()).padStart(2, '0');
    }, 1000);
</script>
</body>
</html>
