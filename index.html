<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone 4s iOS9 Fixed</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-green: #4cd964;
            --ios-red: #ff3b30;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
        body { background: #fff; height: 100vh; overflow: hidden; display: flex; justify-content: center; }

        #phone-wrapper {
            width: 100%; max-width: 430px; height: 100vh;
            background: #fff; position: relative; display: flex; flex-direction: column;
        }

        /* Status Bar (No Battery Percentage) */
        .status-bar { height: 20px; padding: 0 8px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .status-left { display: flex; align-items: center; gap: 4px; }
        .antenna { display: flex; gap: 2px; align-items: flex-end; }
        .antenna div { width: 5px; height: 5px; background: #000; border-radius: 50%; }
        .antenna .off { background: #ccc; }
        .clock { position: absolute; left: 50%; transform: translateX(-50%); font-weight: 600; }

        /* Number View */
        #number-view { height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #my-number-label { font-size: 12px; color: var(--ios-blue); margin-bottom: 5px; font-weight: 500; }
        #dial-string { font-size: 40px; font-weight: 200; height: 48px; }
        .backspace { position: absolute; right: 40px; bottom: 35px; cursor: pointer; display: none; }

        /* Keypad Grid (Gaps tightened) */
        .keypad-container { flex-grow: 1; display: flex; justify-content: center; padding-top: 0; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px 30px; }
        .key {
            width: 75px; height: 75px; border: 1px solid var(--ios-blue); border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.1s;
        }
        .key:active { background: rgba(0, 122, 255, 0.15); }
        .key span { font-size: 36px; font-weight: 200; color: #000; line-height: 1; }
        .key small { font-size: 10px; color: #000; margin-top: -2px; letter-spacing: 1px; }

        .call-btn-area { padding-bottom: 25px; display: flex; justify-content: center; }
        .call-btn { width: 75px; height: 75px; background: var(--ios-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Icons (CSS Drawn) */
        .icon-phone-w { width: 30px; height: 30px; background: white; clip-path: polygon(25% 5%, 40% 30%, 30% 40%, 60% 70%, 70% 60%, 95% 75%, 85% 95%, 50% 95%, 5% 50%, 5% 15%); }
        
        .tab-bar { height: 55px; border-top: 0.5px solid #bbb; display: flex; background: rgba(248,248,248,0.9); }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8e8e93; font-size: 10px; }
        .tab.active { color: var(--ios-blue); }

        /* Call Overlay (Full Gradient) */
        .call-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #4a5a6a 0%, #000 100%);
            z-index: 9999; display: none; flex-direction: column; align-items: center; color: white; padding-top: 60px;
        }
        .call-tools { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px 40px; margin-top: 40px; }
        .tool { display: flex; flex-direction: column; align-items: center; font-size: 12px; gap: 5px; }
        .tool-btn { width: 66px; height: 66px; border: 1px solid rgba(255,255,255,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        .tool-btn.active { background: white; color: black; }
        
        .hangup-btn { width: 75px; height: 75px; background: var(--ios-red); border-radius: 50%; display: flex; align-items: center; justify-content: center; transform: rotate(135deg); margin-top: 50px; cursor: pointer; }

        /* Incoming Slider */
        #inc-overlay { display: none; }
        .slide-track { width: 280px; height: 80px; background: rgba(255,255,255,0.15); border-radius: 40px; position: relative; display: flex; align-items: center; margin-top: auto; margin-bottom: 100px; justify-content: center; }
        .slide-text { font-size: 19px; opacity: 0.8; margin-left: 40px; }
    </style>
</head>
<body onclick="unlockAudio()">

<div id="phone-wrapper">
    <div class="status-bar">
        <div class="status-left">
            <div class="antenna"><div></div><div></div><div></div><div></div><div class="off"></div></div>
            <span style="font-weight:500">JDD</span>
        </div>
        <div class="clock" id="time">15:00</div>
        <div></div>
    </div>

    <div id="view-keypad" style="display:flex; flex-direction:column; height:100%;">
        <div id="number-view">
            <div id="my-number-label">読み込み中...</div>
            <div id="dial-string"></div>
            <div class="backspace" id="back-btn" onclick="del()">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="#8e8e93"><path d="M22,3H7C6.31,3 5.5,3.5 5.12,4.1L1,12L5.12,19.9C5.5,20.5 6.31,21 7,21H22C23.1,21 24,20.1 24,19V5C24,3.9 23.1,3 22,3M19,15.59L17.59,17L14,13.41L10.41,17L9,15.59L12.59,12L9,8.41L10.41,7L14,10.59L17.59,7L19,8.41L15.41,12L19,15.59Z"/></svg>
            </div>
        </div>
        <div class="keypad-container">
            <div class="grid">
                <div class="key" onclick="press('1')"><span>1</span><small>&nbsp;</small></div>
                <div class="key" onclick="press('2')"><span>2</span><small>ABC</small></div>
                <div class="key" onclick="press('3')"><span>3</span><small>DEF</small></div>
                <div class="key" onclick="press('4')"><span>4</span><small>GHI</small></div>
                <div class="key" onclick="press('5')"><span>5</span><small>JKL</small></div>
                <div class="key" onclick="press('6')"><span>6</span><small>MNO</small></div>
                <div class="key" onclick="press('7')"><span>7</span><small>PQRS</small></div>
                <div class="key" onclick="press('8')"><span>8</span><small>TUV</small></div>
                <div class="key" onclick="press('9')"><span>9</span><small>WXYZ</small></div>
                <div class="key" onclick="press('*')"><span>*</span><small>&nbsp;</small></div>
                <div class="key" onclick="press('0')"><span>0</span><small>+</small></div>
                <div class="key" onclick="press('#')"><span>#</span><small>&nbsp;</small></div>
            </div>
        </div>
        <div class="call-btn-area">
            <div class="call-btn" onclick="makeCall()"><div class="icon-phone-w"></div></div>
        </div>
        <div class="tab-bar">
            <div class="tab">連絡先</div>
            <div class="tab active">キーパッド</div>
        </div>
    </div>

    <div id="call-overlay" class="call-overlay">
        <h1 id="call-target-name" style="font-size:36px; font-weight:200">090-0000-0000</h1>
        <p id="call-status-label" style="font-size:18px; margin-top:10px;">発信中...</p>
        <div class="call-tools">
            <div class="tool"><div class="tool-btn" id="m-btn" onclick="toggleMute()">消音</div>消音</div>
            <div class="tool"><div class="tool-btn">:::</div>キーパッド</div>
            <div class="tool"><div class="tool-btn">スピ</div>スピーカー</div>
            <div class="tool"><div class="tool-btn">＋</div>通話を追加</div>
            <div class="tool"><div class="tool-btn">FT</div>FaceTime</div>
            <div class="tool"><div class="tool-btn">人</div>連絡先</div>
        </div>
        <div class="hangup-btn" onclick="hangup()"><div class="icon-phone-w"></div></div>
    </div>

    <div id="inc-overlay" class="call-overlay" style="background: linear-gradient(180deg, #2c3e50 0%, #000 100%);">
        <h1 id="inc-from-name" style="font-size:36px; font-weight:200">080-0000-0000</h1>
        <p style="font-size:18px; margin-top:10px;">JDD 携帯電話</p>
        <div class="slide-track">
            <div class="slide-text">スライドで応答</div>
            <div class="call-btn" id="knob" style="position:absolute; left:5px;"><div class="icon-phone-w"></div></div>
        </div>
    </div>
</div>

<audio id="audio-ding" src="ding.mp3" preload="auto"></audio>
<audio id="audio-ring" src="telephone.mp3" loop preload="auto"></audio>

<script>
    const config = { databaseURL: "https://my-call-14d70-default-rtdb.firebaseio.com" };
    firebase.initializeApp(config);
    const db = firebase.database();

    // 音声のアンロック
    let audioInited = false;
    function unlockAudio() {
        if (audioInited) return;
        document.getElementById('audio-ding').play().then(() => {
            document.getElementById('audio-ding').pause();
            document.getElementById('audio-ding').currentTime = 0;
            audioInited = true;
        }).catch(e => console.log("Audio waiting for interaction"));
    }

    // 番号設定
    let myNum = localStorage.getItem('ios9_phone_num');
    if(!myNum) {
        myNum = "090-" + Math.floor(Math.random()*9000+1000) + "-" + Math.floor(Math.random()*9000+1000);
        localStorage.setItem('ios9_phone_num', myNum);
    }
    document.getElementById('my-number-label').innerText = "自分の番号: " + myNum;
    const myId = myNum.replace(/-/g, '');

    // ダイヤル操作
    let dial = "";
    function press(n) {
        if(dial.length < 13) {
            dial += n; if(dial.length===3 || dial.length===8) dial+="-";
            document.getElementById('dial-string').innerText = dial;
            document.getElementById('back-btn').style.display = 'block';
        }
    }
    function del() {
        dial = dial.slice(0,-1); if(dial.endsWith('-')) dial=dial.slice(0,-1);
        document.getElementById('dial-string').innerText = dial;
        document.getElementById('back-btn').style.display = dial ? 'block' : 'none';
    }

    // 発信
    let callTimer;
    function makeCall() {
        if(dial.length < 11) return;
        const target = dial.replace(/-/g, '');
        
        // ding.mp3を流す
        const d = document.getElementById('audio-ding');
        d.currentTime = 0; d.play().catch(e => console.error(e));

        db.ref('calls/'+target).set({ from: myNum, status: 'ringing' });
        document.getElementById('call-target-name').innerText = dial;
        document.getElementById('call-overlay').style.display = 'flex';

        // 相手の反応を監視
        db.ref('calls/'+target).on('value', snap => {
            const data = snap.val();
            if(data && data.status === 'connected') startCallTimer();
            if(!data) hangup(); 
        });
    }

    function hangup() {
        const target = dial.replace(/-/g, '');
        db.ref('calls/'+target).remove();
        db.ref('calls/'+myId).remove();
        document.getElementById('call-overlay').style.display = 'none';
        document.getElementById('inc-overlay').style.display = 'none';
        document.getElementById('audio-ring').pause();
        clearInterval(callTimer);
        document.getElementById('call-status-label').innerText = "発信中...";
    }

    function startCallTimer() {
        if(callTimer) return;
        let s = 0;
        callTimer = setInterval(() => {
            s++;
            let m = Math.floor(s/60);
            document.getElementById('call-status-label').innerText = (m<10?'0'+m:m)+":"+(s%60<10?'0'+s%60:s%60);
        }, 1000);
    }

    // 着信監視
    db.ref('calls/'+myId).on('value', snap => {
        const data = snap.val();
        if(data && data.status === 'ringing') {
            document.getElementById('inc-from-name').innerText = data.from;
            document.getElementById('inc-overlay').style.display = 'flex';
            // telephone.mp3を流す
            document.getElementById('audio-ring').play().catch(e => console.error(e));
        } else if(!data) {
            document.getElementById('inc-overlay').style.display = 'none';
            document.getElementById('audio-ring').pause();
        }
    });

    // 消音ボタン
    let isMuted = false;
    function toggleMute() {
        isMuted = !isMuted;
        document.getElementById('m-btn').classList.toggle('active', isMuted);
    }

    // スライダー
    const knob = document.getElementById('knob');
    let drag = false;
    knob.onmousedown = knob.ontouchstart = () => drag = true;
    window.onmousemove = window.ontouchmove = (e) => {
        if(!drag) return;
        const rect = knob.parentNode.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left - 35;
        if(x > 0 && x < 205) knob.style.left = x + 'px';
        if(x >= 200) { drag = false; answer(); }
    };
    window.onmouseup = window.ontouchend = () => { drag = false; knob.style.left = '5px'; };

    function answer() {
        db.ref('calls/'+myId).update({ status: 'connected' });
        document.getElementById('inc-overlay').style.display = 'none';
        document.getElementById('audio-ring').pause();
        document.getElementById('call-target-name').innerText = document.getElementById('inc-from-name').innerText;
        document.getElementById('call-overlay').style.display = 'flex';
        startCallTimer();
    }

    // 時計
    setInterval(() => {
        const now = new Date();
        document.getElementById('time').innerText = now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0');
    }, 1000);
</script>
</body>
</html>
