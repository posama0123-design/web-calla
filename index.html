<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phone - iOS 6 Config Fixed</title>
    <style>
        :root {
            --ios-green: linear-gradient(to bottom, #74d68e 0%, #2e9e44 100%);
            --ios-red: linear-gradient(to bottom, #e35d5d 0%, #b32d2d 100%);
            --ios-btn: linear-gradient(to bottom, rgba(255,255,255,0.3) 0%, rgba(0,0,0,0.2) 100%);
        }
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: #000; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #iphone-4s { width: 320px; height: 480px; background: #000; border: 4px solid #333; border-radius: 12px; position: relative; overflow: hidden; box-shadow: 0 20px 80px rgba(0,0,0,0.9); }
        #status-bar { height: 20px; background: linear-gradient(to bottom, #000 0%, #444 100%); font-size: 11px; padding: 0 6px; display: flex; align-items: center; position: absolute; width: 100%; z-index: 1000; }
        .sb-left { display: flex; align-items: center; gap: 4px; width: 100px; }
        .sb-center { position: absolute; left: 50%; transform: translateX(-50%); font-weight: bold; }
        .sb-right { flex: 1; display: flex; justify-content: flex-end; align-items: center; gap: 3px; }
        .antenna { display: flex; align-items: flex-end; gap: 1px; height: 10px; }
        .bar { width: 3px; background: #fff; }
        .battery { width: 18px; height: 8px; border: 1px solid #ccc; background: #4cd964; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding-top: 20px; display: none; }
        .screen.active { display: block; }
        #dialer-screen { background: radial-gradient(circle, #3c4b5d 0%, #1a232e 100%); }
        #display-area { height: 90px; background: linear-gradient(to bottom, #7d8896 0%, #4a596a 100%); display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #222; }
        #input-number { font-size: 32px; font-weight: bold; flex: 1; text-align: center; color: white; letter-spacing: 2px; }
        #keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #333; }
        .key { height: 62px; background: linear-gradient(to bottom, #fdfdfd 0%, #aeaeae 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; color: #000; border: 0.5px solid #666; }
        .key:active { background: #888; }
        .key .num { font-size: 28px; font-weight: bold; line-height: 1; }
        .key .letters { font-size: 9px; font-weight: bold; margin-top: 2px; }
        #call-footer { height: 85px; display: flex; justify-content: center; align-items: center; background: #111; }
        #call-btn { width: 280px; height: 48px; background: var(--ios-green); border-radius: 10px; border: 1px solid #1a5a1a; color: white; font-size: 20px; font-weight: bold; cursor: pointer; }
        #incoming-screen { background: #000; text-align: center; }
        .incoming-actions { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-around; }
        .btn-call { width: 125px; height: 48px; border-radius: 8px; font-weight: bold; font-size: 18px; color: #fff; border: 1px solid #000; cursor: pointer; }
        #calling-screen { background: #1c1c1c; }
        .call-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 30px; width: 85%; margin-left: auto; margin-right: auto; }
        .grid-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #fff; }
        .grid-btn { width: 55px; height: 55px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); background: var(--ios-btn); display: flex; justify-content: center; align-items: center; font-size: 20px; margin-bottom: 5px; }
        #hangup-btn { width: 280px; height: 48px; background: var(--ios-red); border-radius: 10px; color: white; font-size: 20px; font-weight: bold; margin-top: 40px; border: 1px solid #600; cursor: pointer; }
    </style>
</head>
<body>

<div id="iphone-4s">
    <div id="status-bar">
        <div class="sb-left">
            <div class="antenna"><div class="bar" style="height:4px;"></div><div class="bar" style="height:6px;"></div><div class="bar" style="height:8px;"></div><div class="bar" style="height:10px;"></div></div>
            <span>docomo 3G</span>
        </div>
        <div class="sb-center" id="clock">12:00</div>
        <div class="sb-right"><span>100%</span><div class="battery"></div></div>
    </div>

    <div id="dialer-screen" class="screen active">
        <div style="font-size:10px; text-align:center; padding:5px 0 2px 0; background:rgba(0,0,0,0.3); color:#ccc;">
            My: <span id="my-num-text">設定中...</span>
        </div>
        <div id="display-area">
            <div id="input-number"></div>
            <div onclick="backspace()" style="cursor:pointer; font-size:24px; padding-left:10px;">⌫</div>
        </div>
        <div id="keypad">
            <div class="key" onmousedown="press('1')"><span class="num">1</span><span class="letters">&nbsp;</span></div>
            <div class="key" onmousedown="press('2')"><span class="num">2</span><span class="letters">ABC</span></div>
            <div class="key" onmousedown="press('3')"><span class="num">3</span><span class="letters">DEF</span></div>
            <div class="key" onmousedown="press('4')"><span class="num">4</span><span class="letters">GHI</span></div>
            <div class="key" onmousedown="press('5')"><span class="num">5</span><span class="letters">JKL</span></div>
            <div class="key" onmousedown="press('6')"><span class="num">6</span><span class="letters">MNO</span></div>
            <div class="key" onmousedown="press('7')"><span class="num">7</span><span class="letters">PQRS</span></div>
            <div class="key" onmousedown="press('8')"><span class="num">8</span><span class="letters">TUV</span></div>
            <div class="key" onmousedown="press('9')"><span class="num">9</span><span class="letters">WXYZ</span></div>
            <div class="key" onmousedown="press('*')"><span class="num">*</span><span class="letters">&nbsp;</span></div>
            <div class="key" onmousedown="press('0')"><span class="num">0</span><span class="letters">+</span></div>
            <div class="key" onmousedown="press('#')"><span class="num">#</span><span class="letters">&nbsp;</span></div>
        </div>
        <div id="call-footer"><button id="call-btn" onclick="startCall()">発信</button></div>
    </div>

    <div id="incoming-screen" class="screen">
        <div style="margin-top:60px; text-align:center;">
            <div style="color:#ccc; font-size:14px;">着信中...</div>
            <div id="inc-num" style="font-size:32px; margin:14px 0; font-weight:bold;">---</div>
            <div style="color:#aaa; font-size:13px;">携帯電話</div>
        </div>
        <div class="incoming-actions">
            <button class="btn-call" style="background:var(--ios-red)" onclick="endCall()">拒否</button>
            <button class="btn-call" style="background:var(--ios-green)" onclick="answerCall()">応答</button>
        </div>
    </div>

    <div id="calling-screen" class="screen">
        <div style="margin-top:50px; text-align:center;">
            <div id="active-num" style="font-size:28px;">---</div>
            <div id="call-timer" style="color:#4cd964;">発信中...</div>
        </div>
        <div class="call-grid">
            <div class="grid-item"><div class="grid-btn">🔇</div>消音</div>
            <div class="grid-item"><div class="grid-btn">⌨️</div>キーパッド</div>
            <div class="grid-item"><div class="grid-btn">🔊</div>スピーカー</div>
            <div class="grid-item"><div class="grid-btn">➕</div>通話を追加</div>
            <div class="grid-item"><div class="grid-btn">🎥</div>FaceTime</div>
            <div class="grid-item"><div class="grid-btn">👤</div>連絡先</div>
        </div>
        <center><button id="hangup-btn" onclick="endCall()">終了</button></center>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // お送りいただいた Firebase 設定を適用
    const firebaseConfig = {
      apiKey: "AIzaSyBaMe4Cz_3W75F5NCtioAguONgukg3-k0g",
      authDomain: "my-call-14d70.firebaseapp.com",
      projectId: "my-call-14d70",
      storageBucket: "my-call-14d70.firebasestorage.app",
      messagingSenderId: "769393584037",
      appId: "1:769393584037:web:279aa04477f2649230ea4c",
      measurementId: "G-EXHXKKRT56",
      databaseURL: "https://my-call-14d70-default-rtdb.firebaseio.com" // URLも統合
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    let myNum = localStorage.getItem('assigned_num') || `090${Math.floor(10000000 + Math.random() * 90000000)}`;
    localStorage.setItem('assigned_num', myNum);
    document.getElementById('my-num-text').innerText = myNum;

    let targetNum = "";

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    const dtmfFreqs = { '1':[697,1209], '2':[697,1336], '3':[697,1477], '4':[770,1209], '5':[770,1336], '6':[770,1477], '7':[852,1209], '8':[852,1336], '9':[852,1477], '*': [941,1209], '0':[941,1336], '#':[941,1477] };

    window.press = (n) => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const g = audioCtx.createGain(); g.gain.value = 0.1; g.connect(audioCtx.destination);
        dtmfFreqs[n].forEach(f => { const o = audioCtx.createOscillator(); o.frequency.value = f; o.connect(g); o.start(); o.stop(audioCtx.currentTime+0.1); });
        document.getElementById('input-number').innerText += n;
    };

    window.backspace = () => { document.getElementById('input-number').innerText = document.getElementById('input-number').innerText.slice(0, -1); };

    window.startCall = async () => {
        const input = document.getElementById('input-number').innerText;
        if (!input || input === myNum) return;
        targetNum = input;
        document.getElementById('active-num').innerText = targetNum;
        show('calling-screen');
        await set(ref(db, `calls/${targetNum}`), { from: myNum, status: 'ringing' });
    };

    window.answerCall = async () => {
        show('calling-screen');
        document.getElementById('call-timer').innerText = "通話中...";
        await set(ref(db, `calls/${myNum}`), { from: targetNum, status: 'connected' });
    };

    window.endCall = async () => {
        show('dialer-screen');
        document.getElementById('input-number').innerText = "";
        await remove(ref(db, `calls/${myNum}`));
        if (targetNum) await remove(ref(db, `calls/${targetNum}`));
        targetNum = "";
    };

    onValue(ref(db, `calls/${myNum}`), (snap) => {
        const d = snap.val();
        if (d && d.status === 'ringing') {
            targetNum = d.from;
            document.getElementById('inc-num').innerText = targetNum;
            show('incoming-screen');
        } else if (d && d.status === 'connected') {
            document.getElementById('call-timer').innerText = "通話中...";
        } else if (!d) {
            show('dialer-screen');
        }
    });

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }, 1000);
</script>
</body>
</html>
