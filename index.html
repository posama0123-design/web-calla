<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IP-callservice</title>
    <style>
        :root {
            --ios-green: #4cd964;
            --ios-red: #ff3b30;
            --ios-gray: #e5e5e5;
            --ios-dark-gray: #8e8e93;
        }

        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            color: #000;
        }

        .iphone-container {
            width: 375px;
            height: 812px;
            background: #fff;
            position: relative;
            border-radius: 50px;
            border: 12px solid #333;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ステータスバー CSS描画 */
        .status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
        }
        .my-id-display { font-size: 12px; font-weight: bold; color: var(--ios-dark-gray); }
        .status-right { display: flex; align-items: center; gap: 5px; }
        .icon-antenna { display: flex; align-items: flex-end; gap: 2px; height: 12px; }
        .icon-antenna div { width: 3px; background: #000; border-radius: 1px; }
        .icon-battery { width: 22px; height: 11px; border: 1px solid #000; border-radius: 3px; position: relative; }
        .icon-battery::after { content: ''; position: absolute; right: -4px; top: 2px; width: 3px; height: 5px; background: #000; }

        /* 表示エリア */
        .display-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-top: 40px;
        }
        .number-input {
            font-size: 48px;
            font-weight: 300;
            min-height: 60px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .add-contact { color: #007aff; font-size: 17px; cursor: pointer; visibility: hidden; }
        .add-contact.show { visibility: visible; }

        /* キーパッド */
        .dial-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px 25px;
            padding: 20px 45px 40px;
        }
        .dial-btn {
            width: 78px;
            height: 78px;
            border-radius: 50%;
            border: none;
            background: var(--ios-gray);
            font-size: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .dial-btn span { font-size: 10px; font-weight: bold; margin-top: -2px; }
        .dial-btn:active { background: #bbb; }

        /* 下部アクション */
        .actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            padding: 0 45px 60px;
            align-items: center;
        }
        .call-btn {
            grid-column: 2;
            width: 78px;
            height: 78px;
            background: var(--ios-green);
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
        }
        .call-btn.in-call { background: var(--ios-red); transform: rotate(135deg); transition: 0.3s; }

        /* CSS バックスペースアイコン */
        .backspace-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .backspace-btn.show { opacity: 1; }
        .icon-backspace {
            width: 30px;
            height: 20px;
            background: var(--ios-dark-gray);
            clip-path: polygon(30% 0%, 100% 0%, 100% 100%, 30% 100%, 0% 50%);
            position: relative;
        }
        .icon-backspace::after {
            content: '×'; color: white; position: absolute; right: 5px; top: -2px; font-size: 18px;
        }

        /* 受話器アイコン (CSS) */
        .icon-phone {
            width: 30px;
            height: 30px;
            background: currentColor;
            clip-path: path('M6,4 C6,4 4,5 4,8 C4,12 8,19 12,21 C15,22 17,21 17,21 L19,19 C20,18 20,17 19,16 L16,14 C15,13 14,13 13,14 L11,15 C10,14 8,12 7,10 L8,8 C9,7 9,6 8,5 L6,4 Z');
        }

        /* 着信オーバーレイ */
        .incoming-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9);
            color:white; display:flex; flex-direction:column; align-items:center; justify-content:space-around; z-index:100;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="iphone-container">
        <div class="status-bar">
            <div class="my-id-display" id="myIdDisplay">Assigning...</div>
            <div class="status-right">
                <div class="icon-antenna"><div></div><div></div><div></div><div style="height:20%;background:#ccc"></div></div>
                <span class="network-type">4G</span>
                <div class="icon-battery"></div>
            </div>
        </div>

        <div class="display-area">
            <div class="number-input" id="numDisplay"></div>
            <div class="add-contact" id="addContactText">番号を追加</div>
        </div>

        <div class="dial-grid">
            <button class="dial-btn" onclick="tap('1')">1</button>
            <button class="dial-btn" onclick="tap('2', 'ABC')">2<span>ABC</span></button>
            <button class="dial-btn" onclick="tap('3', 'DEF')">3<span>DEF</span></button>
            <button class="dial-btn" onclick="tap('4', 'GHI')">4<span>GHI</span></button>
            <button class="dial-btn" onclick="tap('5', 'JKL')">5<span>JKL</span></button>
            <button class="dial-btn" onclick="tap('6', 'MNO')">6<span>MNO</span></button>
            <button class="dial-btn" onclick="tap('7', 'PQRS')">7<span>PQRS</span></button>
            <button class="dial-btn" onclick="tap('8', 'TUV')">8<span>TUV</span></button>
            <button class="dial-btn" onclick="tap('9', 'WXYZ')">9<span>WXYZ</span></button>
            <button class="dial-btn" onclick="tap('*')">*</button>
            <button class="dial-btn" onclick="tap('0', '+')">0<span>+</span></button>
            <button class="dial-btn" onclick="tap('#')">#</button>
        </div>

        <div class="actions">
            <div></div>
            <button class="call-btn" id="callBtn" onclick="toggleCall()">
                <div class="icon-phone"></div>
            </button>
            <button class="backspace-btn" id="bsBtn" onclick="backspace()">
                <div class="icon-backspace"></div>
            </button>
        </div>

        <div id="incomingCall" class="incoming-overlay hidden">
            <h2>着信中</h2>
            <p id="callerName"></p>
            <button class="call-btn" onclick="answerCall()"><div class="icon-phone"></div></button>
        </div>
    </div>

    <audio id="callingSound" src="ding.mp3" loop></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaMe4Cz_3W75F5NCtioAguONgukg3-k0g",
            authDomain: "my-call-14d70.firebaseapp.com",
            databaseURL: "https://my-call-14d70-default-rtdb.firebaseio.com",
            projectId: "my-call-14d70",
            storageBucket: "my-call-14d70.firebasestorage.app",
            messagingSenderId: "769393584037",
            appId: "1:769393584037:web:279aa04477f2649230ea4c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- IDの自動割り当て ---
        const myId = Math.floor(10000 + Math.random() * 90000).toString();
        document.getElementById('myIdDisplay').innerText = `ID: ${myId}`;
        
        // オンライン状態を登録 (切断時に削除)
        const myRef = ref(db, `users/${myId}`);
        set(myRef, { status: 'online' });
        onDisconnect(myRef).remove();

        // --- 音響エンジン (AudioContext) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playKeySound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        // --- キーパッド操作 ---
        const display = document.getElementById('numDisplay');
        const bsBtn = document.getElementById('bsBtn');
        const addText = document.getElementById('addContactText');

        window.tap = (n) => {
            playKeySound();
            if (display.innerText.length < 11) {
                display.innerText += n;
                updateUI();
            }
        };

        window.backspace = () => {
            display.innerText = display.innerText.slice(0, -1);
            updateUI();
        };

        function updateUI() {
            const hasVal = display.innerText.length > 0;
            bsBtn.classList.toggle('show', hasVal);
            addText.classList.toggle('show', hasVal);
        }

        // --- 通話制御 ---
        let isCalling = false;
        const callBtn = document.getElementById('callBtn');
        const ding = document.getElementById('callingSound');

        window.toggleCall = () => {
            if (!isCalling) {
                const targetId = display.innerText;
                if (!targetId) return;
                isCalling = true;
                callBtn.classList.add('in-call');
                ding.play();
                // Firebaseに発信
                set(ref(db, `calls/${targetId}`), { from: myId, type: 'offer' });
            } else {
                isCalling = false;
                callBtn.classList.remove('in-call');
                ding.pause(); ding.currentTime = 0;
            }
        };

        // 着信待機
        onValue(ref(db, `calls/${myId}`), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('incomingCall').classList.remove('hidden');
                document.getElementById('callerName').innerText = `ID: ${data.from}`;
            }
        });
    </script>
</body>
</html>
