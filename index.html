<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone 4s Phone</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-green: #4cd964;
            --ios-red: #ff3b30;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
        body { background: #fff; height: 100vh; overflow: hidden; display: flex; justify-content: center; }

        /* iPhone 4s Screen Canvas */
        #phone-wrapper {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            background: #fff;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.05);
        }

        /* Status Bar (Clean iOS 9) */
        .status-bar { height: 20px; padding: 0 8px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .status-left { display: flex; align-items: center; gap: 4px; }
        .antenna { display: flex; gap: 2px; align-items: flex-end; }
        .antenna div { width: 5px; height: 5px; background: #000; border-radius: 50%; }
        .antenna .off { background: #ccc; }
        .clock { position: absolute; left: 50%; transform: translateX(-50%); font-weight: 600; }

        /* Dial Area */
        #dial-view { height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #number-display { font-size: 42px; font-weight: 200; min-height: 50px; }
        .backspace { position: absolute; right: 45px; cursor: pointer; display: none; }
        .my-num { font-size: 11px; color: var(--ios-blue); margin-top: 5px; }

        /* Keypad Grid */
        .keypad { flex-grow: 1; display: flex; justify-content: center; padding-top: 10px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px 30px; }
        .key {
            width: 75px; height: 75px; border: 1px solid var(--ios-blue); border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.1s;
        }
        .key:active { background: rgba(0,122,255,0.15); }
        .key span { font-size: 36px; font-weight: 200; color: #000; }
        .key small { font-size: 10px; color: #000; margin-top: -4px; }

        .call-btn-container { padding-bottom: 60px; display: flex; justify-content: center; }
        .btn-green { width: 75px; height: 75px; background: var(--ios-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Tabs */
        .tabs { height: 60px; border-top: 0.5px solid #bbb; display: flex; background: rgba(250,250,250,0.9); }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8e8e93; font-size: 10px; cursor: pointer; }
        .tab.active { color: var(--ios-blue); }

        /* 通話中オーバーレイ */
        .call-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #4a5a6a, #000);
            z-index: 5000; display: none; flex-direction: column; align-items: center; color: white;
            padding-top: 60px;
        }
        .call-name { font-size: 36px; font-weight: 200; }
        .call-timer { font-size: 18px; font-weight: 300; margin-top: 8px; }

        .call-tools {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px 40px;
            margin-top: 40px; width: 280px;
        }
        .tool { display: flex; flex-direction: column; align-items: center; font-size: 12px; }
        .tool-btn {
            width: 65px; height: 65px; border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin-bottom: 8px; cursor: pointer;
        }
        .tool-btn.active { background: white; color: black; }
        .tool-btn.mute-active { background: #fff; color: #000; border-color: #fff; }

        .hangup-btn { width: 75px; height: 75px; background: var(--ios-red); border-radius: 50%; display: flex; align-items: center; justify-content: center; transform: rotate(135deg); margin-top: 50px; cursor: pointer; }

        /* 着信画面 */
        #inc-view { background: linear-gradient(to bottom, #2c3e50, #000); padding-top: 80px; }
        .slider-track { width: 280px; height: 85px; background: var(--glass); border-radius: 45px; position: relative; display: flex; align-items: center; margin-top: 250px;}

        /* Icons */
        .icon-phone { width: 30px; height: 30px; background: white; clip-path: polygon(25% 5%, 40% 30%, 30% 40%, 60% 70%, 70% 60%, 95% 75%, 85% 95%, 50% 95%, 5% 50%, 5% 15%); }
        .svg-icon { width: 28px; height: 28px; fill: currentColor; }
    </style>
</head>
<body onclick="enableAudio()">

<div id="phone-wrapper">
    <div class="status-bar">
        <div class="status-left">
            <div class="antenna"><div></div><div></div><div></div><div></div><div class="off"></div></div>
            <span class="carrier">JDD</span>
        </div>
        <div class="clock" id="time">15:00</div>
        <div class="status-right">100%</div>
    </div>

    <div id="main-ui" style="display:flex; flex-direction:column; height:100%;">
        <div id="dial-view">
            <div class="my-num" id="my-num-display">番号取得中...</div>
            <div id="number-display"></div>
            <div class="backspace" id="back-btn" onclick="del()"><svg style="width:28px;height:28px;fill:#8e8e93" viewBox="0 0 24 24"><path d="M22,3H7C6.31,3 5.5,3.5 5.12,4.1L1,12L5.12,19.9C5.5,20.5 6.31,21 7,21H22C23.1,21 24,20.1 24,19V5C24,3.9 23.1,3 22,3M19,15.59L17.59,17L14,13.41L10.41,17L9,15.59L12.59,12L9,8.41L10.41,7L14,10.59L17.59,7L19,8.41L15.41,12L19,15.59Z"/></svg></div>
        </div>
        <div class="keypad">
            <div class="grid">
                <div class="key" onclick="press('1')"><span>1</span><small>&nbsp;</small></div>
                <div class="key" onclick="press('2')"><span>2</span><small>ABC</small></div>
                <div class="key" onclick="press('3')"><span>3</span><small>DEF</small></div>
                <div class="key" onclick="press('4')"><span>4</span><small>GHI</small></div>
                <div class="key" onclick="press('5')"><span>5</span><small>JKL</small></div>
                <div class="key" onclick="press('6')"><span>6</span><small>MNO</small></div>
                <div class="key" onclick="press('7')"><span>7</span><small>PQRS</small></div>
                <div class="key" onclick="press('8')"><span>8</span><small>TUV</small></div>
                <div class="key" onclick="press('9')"><span>9</span><small>WXYZ</small></div>
                <div class="key" onclick="press('*')"><span>*</span><small>&nbsp;</small></div>
                <div class="key" onclick="press('0')"><span>0</span><small>+</small></div>
                <div class="key" onclick="press('#')"><span>#</span><small>&nbsp;</small></div>
            </div>
        </div>
        <div class="call-btn-container">
            <div class="btn-green" onclick="call()"><div class="icon-phone"></div></div>
        </div>
        <div class="tabs">
            <div class="tab">連絡先</div>
            <div class="tab active">キーパッド</div>
        </div>
    </div>

    <div id="call-ui" class="call-screen">
        <div class="call-name" id="remote-name">090-XXXX-XXXX</div>
        <div class="call-timer" id="timer-label">発信中...</div>
        
        <div class="call-tools">
            <div class="tool"><div class="tool-btn" id="mute-btn" onclick="toggleMute()">消音</div><p>消音</p></div>
            <div class="tool"><div class="tool-btn">:::</div><p>キーパッド</p></div>
            <div class="tool"><div class="tool-btn">スピ</div><p>スピーカー</p></div>
            <div class="tool"><div class="tool-btn">+</div><p>通話を追加</p></div>
            <div class="tool"><div class="tool-btn">FT</div><p>FaceTime</p></div>
            <div class="tool"><div class="tool-btn">人</div><p>連絡先</p></div>
        </div>

        <div class="hangup-btn" onclick="hangup()"><div class="icon-phone"></div></div>
    </div>

    <div id="inc-view" class="call-screen">
        <div class="call-name" id="inc-name">080-YYYY-YYYY</div>
        <div class="call-timer">JDD 携帯電話</div>
        <div class="slider-track">
            <div style="width:100%; text-align:center; opacity:0.6;">スライドで応答</div>
            <div class="btn-green" id="knob" style="position:absolute; left:5px;"><div class="icon-phone"></div></div>
        </div>
    </div>
</div>

<audio id="snd-ding" src="ding.mp3"></audio>
<audio id="snd-ring" src="telephone.mp3" loop></audio>

<script>
    // --- Firebase Setup ---
    const firebaseConfig = {
        apiKey: "AIzaSyBaMe4Cz_3W75F5NCtioAguONgukg3-k0g",
        databaseURL: "https://my-call-14d70-default-rtdb.firebaseio.com",
        projectId: "my-call-14d70",
        appId: "1:769393584037:web:279aa04477f2649230ea4c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- Audio Logic ---
    let audioReady = false;
    let localStream;
    const ding = document.getElementById('snd-ding');
    const ring = document.getElementById('snd-ring');

    async function enableAudio() {
        if(audioReady) return;
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioReady = true;
            console.log("Audio Enabled");
        } catch(e) { console.error(e); }
    }

    // --- My Number ---
    let myNum = localStorage.getItem('iphone4s_num');
    if(!myNum) {
        myNum = "090-" + Math.floor(Math.random()*9000+1000) + "-" + Math.floor(Math.random()*9000+1000);
        localStorage.setItem('iphone4s_num', myNum);
    }
    document.getElementById('my-num-display').innerText = `自分の番号: ${myNum}`;
    const myId = myNum.replace(/-/g, '');

    // --- Dialing ---
    let dialStr = "";
    function press(n) {
        if(dialStr.length < 13) {
            dialStr += n;
            if(dialStr.length === 3 || dialStr.length === 8) dialStr += "-";
            updateUI();
        }
    }
    function del() {
        dialStr = dialStr.slice(0, -1);
        if(dialStr.endsWith('-')) dialStr = dialStr.slice(0, -1);
        updateUI();
    }
    function updateUI() {
        document.getElementById('number-display').innerText = dialStr;
        document.getElementById('back-btn').style.display = dialStr.length > 0 ? 'block' : 'none';
    }

    // --- Call Actions ---
    let timerInterval;
    function call() {
        if(dialStr.length < 11) return;
        ding.play().catch(()=>{});
        const target = dialStr.replace(/-/g, '');
        db.ref('calls/' + target).set({ from: myNum, status: 'ringing' });
        
        document.getElementById('remote-name').innerText = dialStr;
        document.getElementById('call-ui').style.display = 'flex';
    }

    function hangup() {
        const target = dialStr.replace(/-/g, '');
        db.ref('calls/' + target).remove();
        db.ref('calls/' + myId).remove();
        document.getElementById('call-ui').style.display = 'none';
        document.getElementById('inc-view').style.display = 'none';
        ring.pause();
        clearInterval(timerInterval);
        document.getElementById('timer-label').innerText = "発信中...";
    }

    // --- Mute Function ---
    let isMuted = false;
    function toggleMute() {
        if(!localStream) return;
        isMuted = !isMuted;
        localStream.getAudioTracks()[0].enabled = !isMuted;
        document.getElementById('mute-btn').classList.toggle('mute-active', isMuted);
    }

    // --- Incoming Logic ---
    db.ref('calls/' + myId).on('value', snap => {
        const data = snap.val();
        if(data && data.status === 'ringing') {
            document.getElementById('inc-name').innerText = data.from;
            document.getElementById('inc-view').style.display = 'flex';
            ring.play().catch(()=>{});
        } else if(!data) {
            document.getElementById('inc-view').style.display = 'none';
            ring.pause();
        }
    });

    // --- Slider Logic ---
    const knob = document.getElementById('knob');
    let isDragging = false;
    knob.onmousedown = knob.ontouchstart = () => isDragging = true;
    window.onmousemove = window.ontouchmove = (e) => {
        if(!isDragging) return;
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - knob.parentNode.getBoundingClientRect().left - 35;
        if(x > 0 && x < 200) knob.style.left = x + 'px';
        if(x >= 200) {
            isDragging = false;
            answer();
        }
    };
    window.onmouseup = window.ontouchend = () => { isDragging = false; knob.style.left = '5px'; };

    function answer() {
        ring.pause();
        document.getElementById('inc-view').style.display = 'none';
        document.getElementById('remote-name').innerText = document.getElementById('inc-name').innerText;
        document.getElementById('call-ui').style.display = 'flex';
        startTimer();
    }

    function startTimer() {
        let sec = 0;
        document.getElementById('timer-label').innerText = "00:00";
        timerInterval = setInterval(() => {
            sec++;
            let m = Math.floor(sec / 60);
            let s = sec % 60;
            document.getElementById('timer-label').innerText = 
                (m < 10 ? '0'+m : m) + ":" + (s < 10 ? '0'+s : s);
        }, 1000);
    }

    // --- Clock ---
    setInterval(() => {
        const d = new Date();
        document.getElementById('time').innerText = d.getHours() + ":" + String(d.getMinutes()).padStart(2, '0');
    }, 1000);
</script>
</body>
</html>
