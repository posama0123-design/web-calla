<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IP-callservice - HTMLエディター</title>
    <style>
        :root {
            --ios-green: #4cd964;
            --ios-gray: #e5e5e5;
            --ios-blue: #007aff;
            --bg-color: #ffffff;
        }

        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        /* 本体コンテナ */
        .iphone-container {
            width: 375px;
            height: 812px;
            background: var(--bg-color);
            position: relative;
            border-radius: 50px;
            border: 12px solid #333;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* ステータスバー CSSアイコン */
        .status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
        }

        .status-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .icon-antenna {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            width: 18px;
            height: 12px;
        }

        .icon-antenna div {
            width: 3px;
            background: #000;
            border-radius: 1px;
        }

        .icon-antenna div:nth-child(1) { height: 30%; }
        .icon-antenna div:nth-child(2) { height: 50%; }
        .icon-antenna div:nth-child(3) { height: 75%; }
        .icon-antenna div:nth-child(4) { height: 100%; }

        .network-type { font-size: 12px; font-weight: bold; }

        .icon-battery {
            width: 22px;
            height: 11px;
            border: 1px solid #000;
            border-radius: 3px;
            position: relative;
        }

        .icon-battery::after {
            content: '';
            position: absolute;
            right: -4px;
            top: 2px;
            width: 3px;
            height: 5px;
            background: #000;
            border-radius: 0 1px 1px 0;
        }

        /* キーパッド画面 */
        .number-display {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            font-weight: 300;
            margin-top: 20px;
            letter-spacing: 2px;
        }

        .dial-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px 25px;
            padding: 10px 45px;
        }

        .dial-btn {
            width: 78px;
            height: 78px;
            border-radius: 50%;
            border: none;
            background: var(--ios-gray);
            font-size: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .dial-btn span {
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-top: -2px;
            text-transform: uppercase;
        }

        .dial-btn:active { background: #bbb; }

        /* 発信ボタン CSSアイコン */
        .call-action {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }

        .call-btn-container {
            width: 75px;
            height: 75px;
            background: var(--ios-green);
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .icon-phone {
            width: 30px;
            height: 30px;
            background: white;
            clip-path: path('M6,4 C6,4 4,5 4,8 C4,12 8,19 12,21 C15,22 17,21 17,21 L19,19 C20,18 20,17 19,16 L16,14 C15,13 14,13 13,14 L11,15 C10,14 8,12 7,10 L8,8 C9,7 9,6 8,5 L6,4 Z');
        }

        /* 下部ナビゲーション CSS描画 */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 85px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #e0e0e0;
            background: #f9f9f9;
            padding-bottom: 10px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: #8e8e93;
            font-size: 10px;
        }

        .nav-item.active { color: var(--ios-blue); }

        .icon-dots {
            display: grid;
            grid-template-columns: repeat(3, 4px);
            gap: 2px;
        }
        .icon-dots div { width: 4px; height: 4px; background: currentColor; border-radius: 50%; }

        /* 着信オーバーレイ */
        .incoming-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 80px 0;
            z-index: 100;
            transition: opacity 0.3s;
        }

        .hidden { display: none; pointer-events: none; }

        .caller-info h2 { font-size: 32px; font-weight: 400; margin: 0; }
        .caller-info p { font-size: 18px; opacity: 0.8; margin-top: 10px; text-align: center; }

        .slide-track {
            width: 280px;
            height: 75px;
            background: rgba(255,255,255,0.15);
            border-radius: 40px;
            position: relative;
            display: flex;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .slide-text {
            width: 100%;
            text-align: center;
            font-size: 18px;
            color: #fff;
            animation: slideGlow 2s infinite;
        }

        @keyframes slideGlow {
            0% { opacity: 0.3; transform: translateX(-10px); }
            50% { opacity: 1; transform: translateX(0); }
            100% { opacity: 0.3; transform: translateX(10px); }
        }

        .slider-handle {
            width: 65px;
            height: 65px;
            background: var(--ios-green);
            border-radius: 50%;
            position: absolute;
            left: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            touch-action: none;
        }

    </style>
</head>
<body>

    <div class="iphone-container">
        <div class="status-bar">
            <div class="status-left"></div>
            <div class="status-right">
                <div class="icon-antenna"><div></div><div></div><div></div><div></div></div>
                <span class="network-type">4G</span>
                <div class="icon-battery"></div>
            </div>
        </div>

        <main class="keypad-screen">
            <div class="number-display" id="display"></div>
            
            <div class="dial-grid">
                <button class="dial-btn" onclick="pressKey('1')">1</button>
                <button class="dial-btn" onclick="pressKey('2')">2<span>ABC</span></button>
                <button class="dial-btn" onclick="pressKey('3')">3<span>DEF</span></button>
                <button class="dial-btn" onclick="pressKey('4')">4<span>GHI</span></button>
                <button class="dial-btn" onclick="pressKey('5')">5<span>JKL</span></button>
                <button class="dial-btn" onclick="pressKey('6')">6<span>MNO</span></button>
                <button class="dial-btn" onclick="pressKey('7')">7<span>PQRS</span></button>
                <button class="dial-btn" onclick="pressKey('8')">8<span>TUV</span></button>
                <button class="dial-btn" onclick="pressKey('9')">9<span>WXYZ</span></button>
                <button class="dial-btn" onclick="pressKey('*')">*</button>
                <button class="dial-btn" onclick="pressKey('0')">0<span>+</span></button>
                <button class="dial-btn" onclick="pressKey('#')">#</button>
            </div>

            <div class="call-action">
                <button class="call-btn-container" onclick="startCall()">
                    <div class="icon-phone"></div>
                </button>
            </div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item">⭐<span>よく使う項目</span></div>
            <div class="nav-item">🕒<span>履歴</span></div>
            <div class="nav-item">👤<span>連絡先</span></div>
            <div class="nav-item active">
                <div class="icon-dots"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>
                <span>キーパッド</span>
            </div>
            <div class="nav-item">➰<span>留守番電話</span></div>
        </nav>

        <div id="incomingCall" class="incoming-overlay hidden">
            <div class="caller-info">
                <h2>着信中</h2>
                <p id="caller-name">Unknown User</p>
            </div>
            <div class="slide-track">
                <span class="slide-text">スライドで応答</span>
                <div id="slider" class="slider-handle">
                    <div class="icon-phone"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBaMe4Cz_3W75F5NCtioAguONgukg3-k0g",
            authDomain: "my-call-14d70.firebaseapp.com",
            databaseURL: "https://my-call-14d70-default-rtdb.firebaseio.com",
            projectId: "my-call-14d70",
            storageBucket: "my-call-14d70.firebasestorage.app",
            messagingSenderId: "769393584037",
            appId: "1:769393584037:web:279aa04477f2649230ea4c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- 音響生成 (AudioContext) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        window.playDialTone = () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        };

        // --- キーパッド操作 ---
        const display = document.getElementById('display');
        window.pressKey = (val) => {
            window.playDialTone();
            if (display.innerText.length < 15) {
                display.innerText += val;
            }
        };

        window.startCall = () => {
            const num = display.innerText;
            if (!num) return;
            // 相手側への着信シグナリング (例として number をパスに使用)
            set(ref(db, 'calls/' + num), {
                status: 'ringing',
                from: 'HTMLエディター',
                timestamp: Date.now()
            });
            alert(num + " へ発信しています...");
        };

        // --- 着信監視 (自分のIDを 'my-app' と想定) ---
        onValue(ref(db, 'calls/my-app'), (snapshot) => {
            const data = snapshot.val();
            if (data && data.status === 'ringing') {
                document.getElementById('incomingCall').classList.remove('hidden');
                document.getElementById('caller-name').innerText = data.from;
            }
        });

        // --- スライド応答ロジック ---
        const slider = document.getElementById('slider');
        let isDragging = false;
        let startX = 0;

        const handleStart = (e) => {
            isDragging = true;
            startX = (e.pageX || e.touches[0].pageX) - slider.offsetLeft;
        };

        const handleMove = (e) => {
            if (!isDragging) return;
            let currentX = (e.pageX || e.touches[0].pageX) - startX;
            if (currentX < 5) currentX = 5;
            if (currentX > 210) { // 右端に到達
                currentX = 210;
                answerCall();
                isDragging = false;
            }
            slider.style.left = currentX + 'px';
        };

        const handleEnd = () => {
            if (!isDragging) return;
            isDragging = false;
            slider.style.left = '5px'; // 戻る
        };

        slider.addEventListener('mousedown', handleStart);
        slider.addEventListener('touchstart', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchend', handleEnd);

        function answerCall() {
            document.getElementById('incomingCall').classList.add('hidden');
            // ここにWebRTCの接続開始ロジックを実装
            alert("通話を開始しました。");
        }
    </script>
</body>
</html>
