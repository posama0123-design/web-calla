<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>電話 - 080固定番号</title>

<style>
*{-webkit-tap-highlight-color:transparent;outline:none;box-sizing:border-box;}
body{font-family:-apple-system,sans-serif;background:#fff;color:#333;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;overflow:hidden;transition:background .5s}
#bg-overlay{position:fixed;inset:0;background-image:url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1200&q=80');background-size:cover;background-position:center;filter:blur(20px) brightness(.7);transform:scale(1.1);z-index:-1;opacity:0;transition:opacity .8s}
.phone-container{width:350px;height:650px;text-align:center;display:flex;flex-direction:column;justify-content:space-between;padding:40px 20px;position:relative}
.display-number{font-size:32px;font-weight:300;min-height:50px;display:flex;align-items:center;justify-content:center}
.status{font-size:14px;color:#007aff;height:20px}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
.key{width:75px;height:75px;background:#f2f2f7;border-radius:50%;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer}
.key:active{background:#d1d1d6}
.in-call-active{color:#fff}
.in-call-grid{display:none;grid-template-columns:repeat(3,1fr);gap:25px;margin-top:50px}
.bottom-controls{display:flex;justify-content:center;align-items:center;min-height:85px}
.btn-call,.btn-hangup{width:75px;height:75px;border-radius:50%;border:none;cursor:pointer}
.btn-call{background:#28a745}
.btn-hangup{background:#ff3b30;display:none}
#my-number-info{font-size:12px;color:#888;margin-bottom:10px}
</style>
</head>

<body>

<div id="bg-overlay"></div>

<!-- 着信画面 -->
<div id="incomingCall" style="display:none;position:fixed;inset:0;background:#000;color:#fff;z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center">
  <div style="font-size:26px;margin-bottom:10px">📞 通話がかかってきました</div>
  <div id="incomingNumber" style="opacity:.7;margin-bottom:40px"></div>
  <div style="display:flex;gap:40px">
    <button onclick="acceptIncoming()" style="width:80px;height:80px;border-radius:50%;background:#28a745;color:#fff;border:none">出る</button>
    <button onclick="rejectIncoming()" style="width:80px;height:80px;border-radius:50%;background:#ff3b30;color:#fff;border:none">拒否</button>
  </div>
</div>

<div class="phone-container" id="mainContainer">
  <div>
    <div id="my-number-info"></div>
    <div class="display-number" id="numberDisplay"></div>
    <div class="status" id="status">待受中...</div>
  </div>

  <div class="keypad">
    <div class="key" onclick="press('1')">1</div>
    <div class="key" onclick="press('2')">2</div>
    <div class="key" onclick="press('3')">3</div>
    <div class="key" onclick="press('4')">4</div>
    <div class="key" onclick="press('5')">5</div>
    <div class="key" onclick="press('6')">6</div>
    <div class="key" onclick="press('7')">7</div>
    <div class="key" onclick="press('8')">8</div>
    <div class="key" onclick="press('9')">9</div>
    <div class="key" onclick="press('*')">*</div>
    <div class="key" onclick="press('0')">0</div>
    <div class="key" onclick="press('#')">#</div>
  </div>

  <div class="bottom-controls">
    <button class="btn-call" id="callBtn" onclick="call()">📞</button>
    <button class="btn-hangup" id="hangupBtn" onclick="hangup()">✖</button>
  </div>

  <audio id="remoteAudio" autoplay></audio>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={
 apiKey:"AIzaSyBaMe4Cz_3W75F5NCtioAguONgukg3-k0g",
 authDomain:"my-call-14d70.firebaseapp.com",
 projectId:"my-call-14d70"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let MY_NUMBER="",pc,localStream;
let incomingOffer=null,incomingRoomRef=null;

const display=document.getElementById("numberDisplay");
const statusEl=document.getElementById("status");

window.onload=async()=>{
 let n=localStorage.getItem("my_fixed_080_number");
 if(!n){n="080-"+Math.floor(1000+Math.random()*9000)+"-"+Math.floor(1000+Math.random()*9000);localStorage.setItem("my_fixed_080_number",n);}
 MY_NUMBER=n;
 document.getElementById("my-number-info").innerText="あなたの固定番号: "+MY_NUMBER;
 localStream=await navigator.mediaDevices.getUserMedia({audio:true});
 waitIncoming();
};

function waitIncoming(){
 const ref=db.collection("rooms").doc(MY_NUMBER);
 ref.onSnapshot(s=>{
  const d=s.data();
  if(d?.offer&&!incomingOffer){
   incomingOffer=d.offer;
   incomingRoomRef=ref;
   document.getElementById("incomingNumber").innerText="発信元: "+ref.id;
   document.getElementById("incomingCall").style.display="flex";
  }
 });
}

async function acceptIncoming(){
 document.getElementById("incomingCall").style.display="none";
 pc=new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
 pc.ontrack=e=>remoteAudio.srcObject=e.streams[0];
 localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
 await pc.setRemoteDescription(new RTCSessionDescription(incomingOffer));
 const ans=await pc.createAnswer();
 await pc.setLocalDescription(ans);
 await incomingRoomRef.update({answer:{type:ans.type,sdp:ans.sdp}});
}

async function rejectIncoming(){
 document.getElementById("incomingCall").style.display="none";
 if(incomingRoomRef)await incomingRoomRef.delete();
 incomingOffer=null;
}

async function call(){
 const id=display.innerText;
 const ref=db.collection("rooms").doc(id);
 const snap=await ref.get();
 if(!snap.exists)return;
 pc=new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
 pc.ontrack=e=>remoteAudio.srcObject=e.streams[0];
 localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
 await pc.setRemoteDescription(new RTCSessionDescription(snap.data().offer));
 const ans=await pc.createAnswer();
 await pc.setLocalDescription(ans);
 await ref.update({answer:{type:ans.type,sdp:ans.sdp}});
}

function press(n){display.innerText+=n}
function hangup(){location.reload()}
</script>

</body>
</html>
