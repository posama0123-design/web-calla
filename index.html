<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IP-callservice</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-gray: #8e8e93;
            --ios-light: #f2f2f7;
            --ios-green: #4cd964;
            --ios-red: #ff3b30;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; background: #fff; height: 100vh; overflow: hidden; }

        /* --- UI Screens --- */
        #phone-container { width: 100%; height: 100vh; position: relative; display: flex; flex-direction: column; }
        
        /* Status Bar */
        .status-bar { height: 25px; padding: 0 8px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 600; }
        .battery-icon { width: 22px; height: 10px; border: 1px solid #000; border-radius: 2px; position: relative; margin-left: 4px; }
        .battery-icon::after { content: ''; position: absolute; left: 0; top: 0; height: 100%; background: #000; width: 5%; }

        /* Header */
        .screen-header { text-align: center; padding: 15px 0; border-bottom: 1px solid #ddd; font-weight: 600; font-size: 18px; }
        .my-number-banner { text-align: center; font-size: 12px; color: var(--ios-blue); padding: 5px; background: var(--ios-light); }

        /* Keypad Screen */
        #dial-display { height: 80px; display: flex; align-items: center; justify-content: center; font-size: 36px; letter-spacing: 2px; overflow: hidden; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px 30px; padding: 10px 40px; flex-grow: 1; }
        .key { width: 75px; height: 75px; border: 1px solid var(--ios-blue); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; color: #000; }
        .key:active { background: #e5e5e5; }
        .key small { font-size: 10px; font-weight: bold; margin-top: -4px; letter-spacing: 1px; }

        /* Call Button Area */
        .call-area { display: flex; justify-content: center; padding: 20px 0; }
        .btn-call { width: 75px; height: 75px; background: var(--ios-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Tab Bar */
        .tab-bar { height: 60px; border-top: 1px solid #ccc; display: flex; justify-content: space-around; align-items: center; background: #f9f9f9; }
        .tab { display: flex; flex-direction: column; align-items: center; color: var(--ios-gray); font-size: 10px; cursor: pointer; text-decoration: none; }
        .tab.active { color: var(--ios-blue); }

        /* --- CSS ICONS (Exact Recreations) --- */
        .icon { width: 25px; height: 25px; position: relative; margin-bottom: 4px; }
        /* Keypad (Grid) */
        .icon-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 4px; }
        .icon-grid div { width: 5px; height: 5px; background: currentColor; border-radius: 50%; }
        /* Star */
        .icon-star { background: currentColor; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
        /* Clock */
        .icon-clock { border: 2px solid currentColor; border-radius: 50%; }
        .icon-clock::after { content:''; position:absolute; width:2px; height:8px; background:currentColor; left:10px; top:3px; }
        .icon-clock::before { content:''; position:absolute; width:6px; height:2px; background:currentColor; left:10px; top:10px; }
        /* User */
        .icon-user { background: currentColor; border-radius: 50% 50% 0 0; width: 16px; height: 8px; bottom: 0; margin: 0 auto; position: absolute; left: 4px; }
        .icon-user::after { content:''; position:absolute; width:10px; height:10px; background:currentColor; border-radius:50%; top:-11px; left:3px; }
        /* Tape (Voicemail) */
        .icon-tape { width: 24px; height: 12px; border: 2px solid currentColor; border-radius: 10px; top: 6px; }
        .icon-tape::after, .icon-tape::before { content:''; position:absolute; width:6px; height:6px; border:2px solid currentColor; border-radius:50%; top:1px; }
        .icon-tape::before { left: 2px; } .icon-tape::after { right: 2px; }
        /* Phone Icon */
        .icon-phone { width: 30px; height: 30px; background: white; clip-path: polygon(27% 10%, 38% 33%, 30% 42%, 58% 70%, 67% 62%, 90% 73%, 80% 95%, 50% 95%, 5% 50%, 5% 20%); transform: rotate(0deg); }

        /* --- Incoming Call Screen --- */
        #incoming-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #2c3e50, #000);
            display: none; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 80px 0 100px 0; z-index: 1000; color: white;
        }
        .caller-id { text-align: center; }
        .caller-id h1 { font-size: 32px; font-weight: 300; }
        .caller-id p { font-size: 18px; margin-top: 8px; opacity: 0.8; }

        /* Slide to Answer */
        .slide-container {
            width: 280px; height: 80px; background: rgba(255,255,255,0.1);
            border-radius: 50px; position: relative; overflow: hidden;
            display: flex; align-items: center;
        }
        .slide-text { width: 100%; text-align: center; font-size: 20px; animation: shine 2s infinite; }
        @keyframes shine { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
        .slide-knob {
            position: absolute; left: 5px; width: 70px; height: 70px;
            background: var(--ios-green); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        /* --- Contacts Screen --- */
        #contacts-screen { display: none; flex-direction: column; flex-grow: 1; background: #fff; }
        .search-bar { padding: 10px; background: var(--ios-light); }
        .search-bar input { width: 100%; padding: 8px; border: none; border-radius: 8px; text-align: center; }
        .contact-list { flex-grow: 1; overflow-y: auto; }
        .contact-item { padding: 12px 20px; border-bottom: 0.5px solid #ccc; font-size: 17px; }

        /* --- Utils --- */
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="phone-container">
    <div class="status-bar">
        <div class="left">SIMなし <span style="font-size: 10px;">●●●●○</span></div>
        <div class="center" id="clock">14:34</div>
        <div class="right">5% <div class="battery-icon"></div></div>
    </div>

    <div class="my-number-banner" id="my-number-display">番号取得中...</div>

    <div id="view-keypad" class="view-content">
        <div id="dial-display"></div>
        <div class="keypad">
            <div class="key" onclick="tapKey('1')">1<small>&nbsp;</small></div>
            <div class="key" onclick="tapKey('2')">2<small>A B C</small></div>
            <div class="key" onclick="tapKey('3')">3<small>D E F</small></div>
            <div class="key" onclick="tapKey('4')">4<small>G H I</small></div>
            <div class="key" onclick="tapKey('5')">5<small>J K L</small></div>
            <div class="key" onclick="tapKey('6')">6<small>M N O</small></div>
            <div class="key" onclick="tapKey('7')">7<small>P Q R S</small></div>
            <div class="key" onclick="tapKey('8')">8<small>T U V</small></div>
            <div class="key" onclick="tapKey('9')">9<small>W X Y Z</small></div>
            <div class="key" onclick="tapKey('*')">*<small>&nbsp;</small></div>
            <div class="key" onclick="tapKey('0')">0<small>+</small></div>
            <div class="key" onclick="tapKey('#')">#<small>&nbsp;</small></div>
        </div>
        <div class="call-area">
            <div class="btn-call" onclick="makeCall()"><div class="icon-phone"></div></div>
        </div>
    </div>

    <div id="view-contacts" class="view-content" style="display:none;">
        <div class="screen-header">すべての連絡先 <span style="float:right; color:var(--ios-blue); padding-right:15px; font-size:24px;" onclick="addContact()">+</span></div>
        <div class="search-bar"><input type="text" placeholder="検索"></div>
        <div class="contact-list" id="contact-list">
            <div style="text-align:center; color:#888; margin-top:50px;">連絡先なし</div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab" onclick="switchTab('favorites')"><div class="icon icon-star"></div>よく使う項目</div>
        <div class="tab" onclick="switchTab('history')"><div class="icon icon-clock"></div>履歴</div>
        <div class="tab" id="tab-contacts" onclick="switchTab('contacts')"><div class="icon icon-user"></div>連絡先</div>
        <div class="tab active" id="tab-keypad" onclick="switchTab('keypad')"><div class="icon icon-grid"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>キーパッド</div>
        <div class="tab" onclick="switchTab('voicemail')"><div class="icon icon-tape"></div>留守番電話</div>
    </div>
</div>

<div id="incoming-screen">
    <div class="caller-id">
        <h1 id="remote-id">090-XXXX-XXXX</h1>
        <p>携帯電話</p>
    </div>
    <div class="slide-container">
        <div class="slide-text">スライドで応答</div>
        <div class="slide-knob" id="knob"><div class="icon-phone" style="transform: rotate(0deg);"></div></div>
    </div>
</div>

<audio id="audio-ding" src="ding.mp3"></audio>
<audio id="audio-ring" src="telephone.mp3" loop></audio>

<script>
    // --- 1. CONFIG & FIREBASE ---
    // ※ 実際のFirebaseプロジェクトのConfigを入れてください
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        databaseURL: "https://your-project.firebaseio.com",
        projectId: "your-project"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 2. USER ID & NUMBER GENERATION ---
    let myNumber = localStorage.getItem('myFixedNumber');
    if (!myNumber) {
        const prefixes = ['090', '080', '070', '060'];
        const pre = prefixes[Math.floor(Math.random() * prefixes.length)];
        const rand = () => Math.floor(Math.random() * 10000).toString().padStart(4, '0');
        myNumber = `${pre}-${rand()}-${rand()}`;
        localStorage.setItem('myFixedNumber', myNumber);
    }
    document.getElementById('my-number-display').innerText = `あなたの番号: ${myNumber}`;

    // --- 3. DTMF SOUND ENGINE ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const dtmfFreqs = {
        '1': [697, 1209], '2': [697, 1336], '3': [697, 1477],
        '4': [770, 1209], '5': [770, 1336], '6': [770, 1477],
        '7': [852, 1209], '8': [852, 1336], '9': [852, 1477],
        '*': [941, 1209], '0': [941, 1336], '#': [941, 1477]
    };

    function playDTMF(digit) {
        const freqs = dtmfFreqs[digit];
        if (!freqs) return;
        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc1.frequency.value = freqs[0];
        osc2.frequency.value = freqs[1];
        gain.gain.value = 0.1;
        osc1.connect(gain); osc2.connect(gain);
        gain.connect(audioCtx.destination);
        osc1.start(); osc2.start();
        setTimeout(() => { osc1.stop(); osc2.stop(); }, 150);
    }

    // --- 4. DIALING LOGIC ---
    let dialString = "";
    function tapKey(num) {
        if (dialString.length < 13) {
            dialString += num;
            if (dialString.length === 3 || dialString.length === 8) dialString += "-";
            document.getElementById('dial-display').innerText = dialString;
            playDTMF(num);
        }
    }

    // --- 5. FIREBASE SIGNALLING (WebRTC Bridge) ---
    // 自分宛ての着信を監視
    const myCallRef = db.ref('calls/' + myNumber.replace(/-/g, ''));
    myCallRef.on('value', snapshot => {
        const data = snapshot.val();
        if (data && data.status === 'dialing') {
            showIncomingCall(data.from);
        }
    });

    function makeCall() {
        if (dialString.length < 11) return;
        const target = dialString.replace(/-/g, '');
        document.getElementById('audio-ding').play();
        
        db.ref('calls/' + target).set({
            from: myNumber,
            status: 'dialing'
        });
        alert(dialString + " へ発信中...");
    }

    // --- 6. INCOMING CALL UI ---
    const incomingScreen = document.getElementById('incoming-screen');
    const ringAudio = document.getElementById('audio-ring');

    function showIncomingCall(from) {
        document.getElementById('remote-id').innerText = from;
        incomingScreen.style.display = 'flex';
        ringAudio.play().catch(e => console.log("User gesture needed for audio"));
    }

    // Slider Logic
    const knob = document.getElementById('knob');
    let isDragging = false;
    knob.addEventListener('mousedown', () => isDragging = true);
    knob.addEventListener('touchstart', () => isDragging = true);
    window.addEventListener('mousemove', (e) => handleMove(e.clientX));
    window.addEventListener('touchmove', (e) => handleMove(e.touches[0].clientX));
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchend', endDrag);

    function handleMove(x) {
        if (!isDragging) return;
        let containerRect = document.querySelector('.slide-container').getBoundingClientRect();
        let newX = x - containerRect.left - 35;
        if (newX < 5) newX = 5;
        if (newX > 205) { // スライド完了
            newX = 205;
            answerCall();
        }
        knob.style.left = newX + 'px';
    }

    function endDrag() {
        if (!isDragging) return;
        isDragging = false;
        if (parseInt(knob.style.left) < 200) {
            knob.style.left = '5px'; // 戻る
        }
    }

    function answerCall() {
        ringAudio.pause();
        incomingScreen.style.background = "#222";
        document.querySelector('.slide-container').classList.add('hidden');
        alert("通話を開始しました (WebRTC Connection Established)");
        // 本来はここで WebRTC PeerConnection オファー受領処理
    }

    // --- 7. CONTACTS PERSISTENCE ---
    let contacts = JSON.parse(localStorage.getItem('myContacts') || '[]');
    function renderContacts() {
        const list = document.getElementById('contact-list');
        if (contacts.length === 0) {
            list.innerHTML = '<div style="text-align:center; color:#888; margin-top:50px;">連絡先なし</div>';
            return;
        }
        list.innerHTML = contacts.map(c => `<div class="contact-item">${c.name}</div>`).join('');
    }

    function addContact() {
        const name = prompt("名前を入力:");
        if (name) {
            contacts.push({ name });
            localStorage.setItem('myContacts', JSON.stringify(contacts));
            renderContacts();
        }
    }

    // --- 8. TAB NAVIGATION ---
    function switchTab(screen) {
        document.querySelectorAll('.view-content').forEach(v => v.style.display = 'none');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        
        if (screen === 'keypad') {
            document.getElementById('view-keypad').style.display = 'block';
            document.getElementById('tab-keypad').classList.add('active');
        } else if (screen === 'contacts') {
            document.getElementById('view-contacts').style.display = 'flex';
            document.getElementById('tab-contacts').classList.add('active');
            renderContacts();
        }
    }

    // Time update
    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
    }, 1000);

</script>
</body>
</html>
