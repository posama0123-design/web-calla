<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone 4s Fixed</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --ios-blue: #007AFF; --ios-green: #4cd964; --ios-red: #ff3b30; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Helvetica Neue", Arial, sans-serif; }
        
        /* グラデーションを画面全体に適用するための設定 */
        body { 
            background: #fff; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            transition: background 0.3s;
        }

        #phone-wrapper {
            width: 100%; max-width: 320px; height: 100vh;
            position: relative; display: flex; flex-direction: column;
            z-index: 2;
        }

        /* ヘッダー位置の調整（少し下へ） */
        .status-bar { height: 40px; padding-top: 15px; padding-inline: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .status-left { display: flex; align-items: center; gap: 3px; }
        .antenna { display: flex; gap: 2px; align-items: flex-end; }
        .antenna div { width: 5px; height: 5px; background: #000; border-radius: 50%; }
        .antenna .off { background: #ccc; }
        .clock { position: absolute; left: 50%; transform: translateX(-50%); font-weight: 700; top: 15px; }
        
        /* 自分の番号も少し下へ */
        #my-num { width: 100%; text-align: center; font-size: 11px; color: var(--ios-blue); margin-top: 5px; }

        /* Dial View */
        #dial-view { height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #dial-string { font-size: 40px; font-weight: 200; color: #000; }
        .backspace { position: absolute; right: 10px; bottom: 25px; cursor: pointer; display: none; }

        /* Keypad (横の隙間を修正) */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px 20px; justify-items: center; padding: 0 35px; }
        .key {
            width: 70px; height: 70px; border: 1px solid var(--ios-blue); border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .key:active { background: rgba(0, 122, 255, 0.1); }
        .key span { font-size: 34px; font-weight: 200; color: #000; }
        .key small { font-size: 9px; color: #000; margin-top: -4px; }

        .call-area { display: flex; justify-content: center; padding-top: 20px; }
        .call-btn { width: 70px; height: 70px; background: var(--ios-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .icon-phone { width: 28px; height: 28px; background: white; clip-path: polygon(25% 5%, 40% 30%, 30% 40%, 60% 70%, 70% 60%, 95% 75%, 85% 95%, 50% 95%, 5% 50%, 5% 15%); }

        /* Call Screen UI */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: none; flex-direction: column; align-items: center; color: white; padding-top: 80px;
            z-index: 100;
        }
        .call-tools { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px 40px; margin-top: 40px; }
        .t-btn { width: 65px; height: 65px; border: 1px solid rgba(255,255,255,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .hangup { width: 72px; height: 72px; background: var(--ios-red); border-radius: 50%; display: flex; align-items: center; justify-content: center; transform: rotate(135deg); margin-top: 60px; cursor: pointer; }

        /* Slider (位置を上に移動) */
        .slider-wrap { margin-top: 250px; }
        .slider { width: 250px; height: 70px; background: rgba(255,255,255,0.15); border-radius: 35px; position: relative; display: flex; align-items: center; }
        .slider-text { width: 100%; text-align: center; font-size: 18px; opacity: 0.8; padding-left: 50px; }
    </style>
</head>
<body onclick="initAudio()">

<div id="phone-wrapper">
    <div class="status-bar">
        <div class="status-left">
            <div class="antenna"><div></div><div></div><div></div><div></div><div class="off"></div></div>
            <span style="font-weight:600">JDD</span>
        </div>
        <div class="clock" id="time">00:00</div>
    </div>
    <div id="my-num">番号取得中...</div>

    <div id="dial-view">
        <div id="dial-string"></div>
        <div class="backspace" id="back-btn" onclick="del()">
            <svg width="25" height="25" viewBox="0 0 24 24" fill="#8e8e93"><path d="M22,3H7C6.31,3 5.5,3.5 5.12,4.1L1,12L5.12,19.9C5.5,20.5 6.31,21 7,21H22C23.1,21 24,20.1 24,19V5C24,3.9 23.1,3 22,3M19,15.59L17.59,17L14,13.41L10.41,17L9,15.59L12.59,12L9,8.41L10.41,7L14,10.59L17.59,7L19,8.41L15.41,12L19,15.59Z"/></svg>
        </div>
    </div>

    <div class="grid">
        <div class="key" onclick="press('1')"><span>1</span><small>&nbsp;</small></div>
        <div class="key" onclick="press('2')"><span>2</span><small>ABC</small></div>
        <div class="key" onclick="press('3')"><span>3</span><small>DEF</small></div>
        <div class="key" onclick="press('4')"><span>4</span><small>GHI</small></div>
        <div class="key" onclick="press('5')"><span>5</span><small>JKL</small></div>
        <div class="key" onclick="press('6')"><span>6</span><small>MNO</small></div>
        <div class="key" onclick="press('7')"><span>7</span><small>PQRS</small></div>
        <div class="key" onclick="press('8')"><span>8</span><small>TUV</small></div>
        <div class="key" onclick="press('9')"><span>9</span><small>WXYZ</small></div>
        <div class="key" onclick="press('*')"><span>*</span><small>&nbsp;</small></div>
        <div class="key" onclick="press('0')"><span>0</span><small>+</small></div>
        <div class="key" onclick="press('#')"><span>#</span><small>&nbsp;</small></div>
    </div>

    <div class="call-area">
        <div class="call-btn" onclick="makeCall()"><div class="icon-phone"></div></div>
    </div>
</div>

<div id="call-ui" class="overlay" style="background: linear-gradient(180deg, #4a5a6a 0%, #000 100%);">
    <h1 id="call-name" style="font-size:36px; font-weight:200">...</h1>
    <p id="call-timer" style="font-size:18px; margin-top:10px;">発信中...</p>
    <div class="call-tools">
        <div class="tool"><div class="t-btn">消音</div>消音</div>
        <div class="tool"><div class="t-btn">:::</div>キーパッド</div>
        <div class="tool"><div class="t-btn">スピ</div>スピーカー</div>
        <div class="tool"><div class="t-btn">＋</div>通話追加</div>
        <div class="tool"><div class="t-btn">FT</div>FaceTime</div>
        <div class="tool"><div class="t-btn">人</div>連絡先</div>
    </div>
    <div class="hangup" onclick="hangup()"><div class="icon-phone"></div></div>
</div>

<div id="inc-ui" class="overlay" style="background: linear-gradient(180deg, #2c3e50 0%, #000 100%);">
    <h1 id="inc-name" style="font-size:36px; font-weight:200">...</h1>
    <p style="font-size:18px; margin-top:10px;">JDD 携帯電話</p>
    <div class="slider-wrap">
        <div class="slider">
            <div class="slider-text">スライドで応答</div>
            <div class="call-btn" id="knob" style="position:absolute; left:5px;"><div class="icon-phone"></div></div>
        </div>
    </div>
</div>

<audio id="snd-ding" src="ding.mp3"></audio>
<audio id="snd-ring" src="telephone.mp3" loop></audio>

<script>
    const config = { databaseURL: "https://my-call-14d70-default-rtdb.firebaseio.com" };
    firebase.initializeApp(config);
    const db = firebase.database();

    let audioCtx;
    function initAudio() {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if(audioCtx.state === 'suspended') audioCtx.resume();
        // ダミー再生でロック解除
        document.getElementById('snd-ding').play().then(()=>document.getElementById('snd-ding').pause());
    }

    // 自分の番号
    let myNum = localStorage.getItem('4s_final_v2') || "090-" + Math.floor(Math.random()*9000+1000) + "-" + Math.floor(Math.random()*9000+1000);
    localStorage.setItem('4s_final_v2', myNum);
    document.getElementById('my-num').innerText = "自分の番号: " + myNum;
    const myId = myNum.replace(/-/g, '');

    // キー入力
    let dial = "";
    function press(n) {
        if(dial.length < 13) {
            dial += n; if(dial.length===3 || dial.length===8) dial+="-";
            document.getElementById('dial-string').innerText = dial;
            document.getElementById('back-btn').style.display = 'block';
        }
    }
    function del() {
        dial = dial.slice(0,-1); if(dial.endsWith('-')) dial=dial.slice(0,-1);
        document.getElementById('dial-string').innerText = dial;
        document.getElementById('back-btn').style.display = dial ? 'block' : 'none';
    }

    // 通話制御
    let timer;
    function makeCall() {
        if(dial.length < 11) return;
        const target = dial.replace(/-/g, '');
        document.getElementById('snd-ding').play().catch(()=>{});
        db.ref('calls/'+target).set({ from: myNum, status: 'ringing' });
        document.getElementById('call-name').innerText = dial;
        document.getElementById('call-ui').style.display = 'flex';
        db.ref('calls/'+target).on('value', snap => {
            const d = snap.val();
            if(d && d.status === 'connected') startTimer();
            if(!d) hangup();
        });
    }

    function hangup() {
        const target = dial.replace(/-/g, '');
        db.ref('calls/'+target).remove();
        db.ref('calls/'+myId).remove();
        document.getElementById('call-ui').style.display = 'none';
        document.getElementById('inc-ui').style.display = 'none';
        document.getElementById('snd-ring').pause();
        clearInterval(timer);
        document.getElementById('call-timer').innerText = "発信中...";
    }

    function startTimer() {
        if(timer) return;
        let s = 0;
        timer = setInterval(() => {
            s++;
            let m = Math.floor(s/60);
            document.getElementById('call-timer').innerText = (m<10?'0'+m:m)+":"+(s%60<10?'0'+s%60:s%60);
        }, 1000);
    }

    // 着信監視
    db.ref('calls/'+myId).on('value', snap => {
        const d = snap.val();
        if(d && d.status === 'ringing') {
            document.getElementById('inc-name').innerText = d.from;
            document.getElementById('inc-ui').style.display = 'flex';
            document.getElementById('snd-ring').play().catch(()=>{});
        } else if(!d) {
            document.getElementById('inc-ui').style.display = 'none';
            document.getElementById('snd-ring').pause();
        }
    });

    // 着信スライダー
    const knob = document.getElementById('knob');
    let drag = false;
    knob.onmousedown = knob.ontouchstart = () => drag = true;
    window.onmousemove = window.ontouchmove = (e) => {
        if(!drag) return;
        const rect = knob.parentNode.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left - 35;
        if(x > 0 && x < 185) knob.style.left = x + 'px';
        if(x >= 180) { drag = false; answer(); }
    };
    window.onmouseup = window.ontouchend = () => { drag = false; knob.style.left = '5px'; };

    function answer() {
        db.ref('calls/'+myId).update({ status: 'connected' });
        document.getElementById('inc-ui').style.display = 'none';
        document.getElementById('snd-ring').pause();
        document.getElementById('call-name').innerText = document.getElementById('inc-name').innerText;
        document.getElementById('call-ui').style.display = 'flex';
        startTimer();
    }

    // 時計
    setInterval(() => {
        const d = new Date();
        document.getElementById('time').innerText = d.getHours() + ":" + String(d.getMinutes()).padStart(2, '0');
    }, 1000);
</script>
</body>
</html>
