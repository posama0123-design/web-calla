<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGM Rugged Phone UI</title>
    <style>
        :root {
            --phone-body: #121212;
            --screen-bg: #444444; /* 灰色の画面 */
            --key-bg: #2a2a2a;
            --accent-gold: #ffc107;
        }

        body {
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            color: white;
            user-select: none;
        }

        /* 筐体 */
        .phone-case {
            width: 300px;
            background: var(--phone-body);
            padding: 25px 15px;
            border-radius: 30px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            border: 2px solid #333;
            position: relative;
        }

        /* ディスプレイ部分 (操作不可) */
        .display-unit {
            width: 90%;
            height: 180px;
            background: var(--screen-bg);
            margin: 0 auto 15px;
            border: 10px solid #1a1a1a;
            pointer-events: none; /* タッチ無効 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #numberDisplay {
            font-size: 24px;
            letter-spacing: 2px;
            height: 30px;
            margin-bottom: 10px;
        }

        #status {
            font-size: 14px;
            color: #ccc;
        }

        #my-number-info {
            position: absolute;
            top: 5px;
            font-size: 10px;
            color: #888;
        }

        .brand {
            text-align: center;
            font-size: 12px;
            color: var(--accent-gold);
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* 十字キー / 操作パネル */
        .navigation-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            gap: 5px;
        }

        .nav-key {
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 1px solid #333;
            border-radius: 4px;
        }

        .nav-key:active { background: #444; }

        .center-ok {
            grid-column: 2;
            grid-row: 2;
            background: #333;
            border: 2px solid #555;
            font-weight: bold;
            font-size: 12px;
        }

        /* 通話・終了ボタン（受話器） */
        .call-controls {
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            margin-bottom: 20px;
        }

        .ctrl-btn {
            width: 60px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .btn-green { border: 2px solid #2ecc71; color: #2ecc71; }
        .btn-red { border: 2px solid #e74c3c; color: #e74c3c; }
        .btn-green:active { background: rgba(46, 204, 113, 0.2); }
        .btn-red:active { background: rgba(231, 76, 60, 0.2); }

        /* ダイヤルキーパッド */
        .dial-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 0 10px;
        }

        .key {
            background: var(--key-bg);
            padding: 12px 0;
            text-align: center;
            border-radius: 5px;
            cursor: pointer;
            border-bottom: 2px solid #000;
        }

        .key:active { transform: translateY(2px); background: #3a3a3a; }
        .key b { display: block; font-size: 18px; }
        .key span { display: block; font-size: 8px; color: #888; }
    </style>
</head>
<body>

<div class="phone-case">
    <div class="brand">AGM MOBILE</div>

    <div class="display-unit">
        <div id="my-number-info">読込中...</div>
        <div id="numberDisplay"></div>
        <div id="status">READY</div>
    </div>

    <div class="navigation-panel">
        <div class="nav-key" style="grid-column: 2; grid-row: 1;">▲</div>
        <div class="nav-key" style="grid-column: 1; grid-row: 2;">◀</div>
        <div class="nav-key center-ok" onclick="handleCall()">OK</div>
        <div class="nav-key" style="grid-column: 3; grid-row: 2;">▶</div>
        <div class="nav-key" style="grid-column: 2; grid-row: 3;">▼</div>
    </div>

    <div class="call-controls">
        <div class="ctrl-btn btn-green" onclick="handleCall()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
        </div>
        <div class="ctrl-btn btn-red" onclick="hangup()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></svg>
        </div>
    </div>

    <div class="dial-grid">
        <div class="key" onclick="press('1')"><b>1</b><span>.,@</span></div>
        <div class="key" onclick="press('2')"><b>2</b><span>ABC</span></div>
        <div class="key" onclick="press('3')"><b>3</b><span>DEF</span></div>
        <div class="key" onclick="press('4')"><b>4</b><span>GHI</span></div>
        <div class="key" onclick="press('5')"><b>5</b><span>JKL</span></div>
        <div class="key" onclick="press('6')"><b>6</b><span>MNO</span></div>
        <div class="key" onclick="press('7')"><b>7</b><span>PQRS</span></div>
        <div class="key" onclick="press('8')"><b>8</b><span>TUV</span></div>
        <div class="key" onclick="press('9')"><b>9</b><span>WXYZ</span></div>
        <div class="key" onclick="press('*')"><b>*</b><span>+</span></div>
        <div class="key" onclick="press('0')"><b>0</b><span>_</span></div>
        <div class="key" onclick="backspace()"><b>#</b><span>Clear</span></div>
    </div>
</div>

<audio id="remoteAudio" autoplay></audio>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

<script>
    // Firebase設定
    const firebaseConfig = { 
        apiKey: "AIzaSyBaMe4Cz_3W75F5NCtioAguONgukg3-k0g", 
        authDomain: "my-call-14d70.firebaseapp.com", 
        projectId: "my-call-14d70", 
        storageBucket: "my-call-14d70.firebasestorage.app", 
        messagingSenderId: "769393584037", 
        appId: "1:769393584037:web:279aa04477f2649230ea4c" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let MY_NUMBER = "";
    let currentRoomId = "";
    let localStream, pc, timerInterval, unsubscribeRoom;
    let isCalling = false;

    const display = document.getElementById('numberDisplay');
    const statusEl = document.getElementById('status');
    const myNumInfo = document.getElementById('my-number-info');
    const remoteAudio = document.getElementById('remoteAudio');

    window.onload = async () => {
        let saved = localStorage.getItem('my_fixed_080_number');
        if (!saved) {
            saved = "080-" + Math.floor(1000+Math.random()*9000) + "-" + Math.floor(1000+Math.random()*9000);
            localStorage.setItem('my_fixed_080_number', saved);
        }
        MY_NUMBER = saved;
        myNumInfo.innerText = "My: " + MY_NUMBER;

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            statusEl.innerText = "待受中...";
            autoStartWaiting();
        } catch (e) { statusEl.innerText = "マイク許可が必要"; }
    };

    function press(num) {
        if (isCalling) return;
        let current = display.innerText.replace(/-/g, "");
        if (current.length >= 11) return;
        current += num;
        display.innerText = formatNumber(current);
    }

    function formatNumber(num) {
        if (num.length > 7) return num.slice(0, 3) + "-" + num.slice(3, 7) + "-" + num.slice(7);
        if (num.length > 3) return num.slice(0, 3) + "-" + num.slice(3);
        return num;
    }

    function backspace() {
        if (isCalling) return;
        let current = display.innerText.replace(/-/g, "").slice(0, -1);
        display.innerText = formatNumber(current);
    }

    function handleCall() {
        if (!isCalling) call();
    }

    // --- WebRTC Logic ---
    async function autoStartWaiting() {
        const roomRef = db.collection('rooms').doc(MY_NUMBER);
        createPC();
        watchRoom(MY_NUMBER);
        pc.onicecandidate = e => e.candidate && roomRef.collection('callerCandidates').add(e.candidate.toJSON());
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        await roomRef.set({ offer: { type: offer.type, sdp: offer.sdp } });
        roomRef.onSnapshot(async snap => {
            const data = snap.data();
            if (!pc.currentRemoteDescription && data?.answer) await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
        });
        roomRef.collection('calleeCandidates').onSnapshot(snap => {
            snap.docChanges().forEach(change => { if (change.type === 'added') pc.addIceCandidate(new RTCIceCandidate(change.doc.data())); });
        });
    }

    async function call() {
        const targetId = display.innerText;
        if (targetId.length < 1) return;
        isCalling = true;
        statusEl.innerText = "発信中...";
        const roomRef = db.collection('rooms').doc(targetId);
        const roomSnapshot = await roomRef.get();
        if (!roomSnapshot.exists) { playGuidance(); return; }
        
        watchRoom(targetId);
        createPC();
        pc.onicecandidate = e => e.candidate && roomRef.collection('calleeCandidates').add(e.candidate.toJSON());
        const data = roomSnapshot.data();
        await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        await roomRef.update({ answer: { type: answer.type, sdp: answer.sdp } });
        roomRef.collection('callerCandidates').onSnapshot(snap => {
            snap.docChanges().forEach(change => { if (change.type === 'added') pc.addIceCandidate(new RTCIceCandidate(change.doc.data())); });
        });
    }

    function createPC() {
        pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        pc.ontrack = e => { remoteAudio.srcObject = e.streams[0]; };
        if (localStream) localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        pc.onconnectionstatechange = () => {
            if (pc.connectionState === 'connected') startTimer();
        };
    }

    function watchRoom(roomId) {
        currentRoomId = roomId;
        unsubscribeRoom = db.collection('rooms').doc(roomId).onSnapshot(snap => {
            if (!snap.exists && pc) hangup(false);
        });
    }

    async function hangup(cleanUpDb = true) {
        speechSynthesis.cancel();
        if (unsubscribeRoom) unsubscribeRoom();
        if (cleanUpDb && currentRoomId) await db.collection('rooms').doc(currentRoomId).delete();
        if (pc) { pc.close(); pc = null; }
        location.reload();
    }

    function startTimer() {
        let sec = 0;
        timerInterval = setInterval(() => {
            sec++;
            const m = String(Math.floor(sec / 60)).padStart(2, '0');
            const s = String(sec % 60).padStart(2, '0');
            statusEl.innerText = `通話中 ${m}:${s}`;
        }, 1000);
    }

    function playGuidance() {
        const uttr = new SpeechSynthesisUtterance("おかけになった電話番号は、現在使われておりません。");
        uttr.lang = "ja-JP";
        speechSynthesis.speak(uttr);
        statusEl.innerText = "接続不可";
        uttr.onend = () => setTimeout(() => hangup(false), 1000);
    }
</script>

</body>
</html>
