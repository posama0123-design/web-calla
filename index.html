<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone 4s iOS9</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-green: #4cd964;
            --ios-red: #ff3b30;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
        body { background: #fff; height: 100vh; overflow: hidden; display: flex; justify-content: center; }

        #phone-wrapper {
            width: 100%; max-width: 430px; height: 100vh;
            background: #fff; position: relative; display: flex; flex-direction: column;
        }

        /* Status Bar */
        .status-bar { height: 20px; padding: 0 8px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .status-left { display: flex; align-items: center; gap: 4px; }
        .antenna { display: flex; gap: 2px; align-items: flex-end; }
        .antenna div { width: 5px; height: 5px; background: #000; border-radius: 50%; }
        .antenna .off { background: #ccc; }
        .clock { position: absolute; left: 50%; transform: translateX(-50%); font-weight: 600; }

        /* Number View */
        #number-view { height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #dial-string { font-size: 40px; font-weight: 200; height: 48px; }
        .backspace { position: absolute; right: 40px; cursor: pointer; display: none; }
        .backspace svg { width: 28px; height: 28px; fill: #8e8e93; }

        /* Keypad Grid (Gap Adjusted) */
        .keypad-container { flex-grow: 1; display: flex; justify-content: center; padding-top: 5px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px 35px; }
        .key {
            width: 75px; height: 75px; border: 1px solid var(--ios-blue); border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.1s;
        }
        .key:active { background: rgba(0, 122, 255, 0.15); }
        .key span { font-size: 36px; font-weight: 200; color: #000; }
        .key small { font-size: 10px; color: #000; margin-top: -5px; letter-spacing: 1px; }

        .call-btn-area { padding-bottom: 30px; display: flex; justify-content: center; }
        .call-btn { width: 75px; height: 75px; background: var(--ios-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Tabs */
        .tab-bar { height: 55px; border-top: 0.5px solid #bbb; display: flex; background: rgba(248,248,248,0.9); }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8e8e93; font-size: 10px; cursor: pointer; }
        .tab.active { color: var(--ios-blue); }

        /* CSS Icons */
        .icon { width: 24px; height: 24px; position: relative; margin-bottom: 2px; }
        .icon-user { border-radius: 50%; border: 1.5px solid currentColor; overflow: hidden; }
        .icon-user::before { content:''; position:absolute; width:8px; height:8px; background:currentColor; border-radius:50%; top:2px; left:6.5px; }
        .icon-user::after { content:''; position:absolute; width:16px; height:8px; background:currentColor; border-radius:8px 8px 0 0; bottom:-1px; left:2.5px; }
        .icon-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 3px; }
        .icon-grid div { width: 5px; height: 5px; background: currentColor; border-radius: 50%; }
        .icon-phone-w { width: 30px; height: 30px; background: white; clip-path: polygon(25% 5%, 40% 30%, 30% 40%, 60% 70%, 70% 60%, 95% 75%, 85% 95%, 50% 95%, 5% 50%, 5% 15%); }

        /* 通話画面 (Full Gradient) */
        .call-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #4a5a6a 0%, #000 100%);
            z-index: 9999; display: none; flex-direction: column; align-items: center; color: white; padding-top: 60px;
        }
        .call-tools { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px 45px; margin-top: 40px; }
        .tool { display: flex; flex-direction: column; align-items: center; font-size: 12px; gap: 8px; }
        .tool-btn { width: 66px; height: 66px; border: 1px solid rgba(255,255,255,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .tool-btn.active { background: white; color: black; }
        .hangup-btn { width: 75px; height: 75px; background: var(--ios-red); border-radius: 50%; display: flex; align-items: center; justify-content: center; transform: rotate(135deg); margin-top: 60px; cursor: pointer; }

        /* 着信画面 */
        #inc-overlay { background: linear-gradient(180deg, #2c3e50 0%, #000 100%); display: none; }
        .slide-track { width: 280px; height: 80px; background: rgba(255,255,255,0.15); border-radius: 40px; position: relative; display: flex; align-items: center; margin-top: auto; margin-bottom: 100px; }
        .slide-text { width: 100%; text-align: center; font-size: 19px; padding-left: 50px; opacity: 0.8; }

        /* 連絡先リスト */
        #contact-view { display: none; flex-grow: 1; background: #fff; overflow-y: auto; }
        .contact-item { padding: 12px 20px; border-bottom: 0.5px solid #ccc; cursor: pointer; font-size: 18px; }
        .add-contact { color: var(--ios-blue); padding: 15px; text-align: right; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body onclick="initAudio()">

<div id="phone-wrapper">
    <div class="status-bar">
        <div class="status-left"><div class="antenna"><div></div><div></div><div></div><div></div><div class="off"></div></div><span style="font-weight:500">JDD</span></div>
        <div class="clock" id="time">15:29</div>
        <div></div> </div>

    <div id="view-keypad" style="display:flex; flex-direction:column; height:100%;">
        <div id="number-view">
            <div id="dial-string"></div>
            <div class="backspace" id="back-btn" onclick="del()"><svg viewBox="0 0 24 24"><path d="M22,3H7C6.31,3 5.5,3.5 5.12,4.1L1,12L5.12,19.9C5.5,20.5 6.31,21 7,21H22C23.1,21 24,20.1 24,19V5C24,3.9 23.1,3 22,3M19,15.59L17.59,17L14,13.41L10.41,17L9,15.59L12.59,12L9,8.41L10.41,7L14,10.59L17.59,7L19,8.41L15.41,12L19,15.59Z"/></svg></div>
        </div>
        <div class="keypad-container">
            <div class="grid">
                <div class="key" onclick="press('1')"><span>1</span><small>&nbsp;</small></div>
                <div class="key" onclick="press('2')"><span>2</span><small>ABC</small></div>
                <div class="key" onclick="press('3')"><span>3</span><small>DEF</small></div>
                <div class="key" onclick="press('4')"><span>4</span><small>GHI</small></div>
                <div class="key" onclick="press('5')"><span>5</span><small>JKL</small></div>
                <div class="key" onclick="press('6')"><span>6</span><small>MNO</small></div>
                <div class="key" onclick="press('7')"><span>7</span><small>PQRS</small></div>
                <div class="key" onclick="press('8')"><span>8</span><small>TUV</small></div>
                <div class="key" onclick="press('9')"><span>9</span><small>WXYZ</small></div>
                <div class="key" onclick="press('*')"><span>*</span><small>&nbsp;</small></div>
                <div class="key" onclick="press('0')"><span>0</span><small>+</small></div>
                <div class="key" onclick="press('#')"><span>#</span><small>&nbsp;</small></div>
            </div>
        </div>
        <div class="call-btn-area"><div class="call-btn" onclick="call()"><div class="icon-phone-w"></div></div></div>
    </div>

    <div id="contact-view">
        <div class="add-contact" onclick="addContact()">＋</div>
        <div id="contact-list"></div>
    </div>

    <div class="tab-bar">
        <div class="tab" id="tab-c" onclick="switchView('contact')"><div class="icon icon-user"></div>連絡先</div>
        <div class="tab active" id="tab-k" onclick="switchView('keypad')"><div class="icon icon-grid"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>キーパッド</div>
    </div>

    <div id="call-overlay" class="call-overlay">
        <h1 id="call-target" style="font-size:36px; font-weight:200">090-0000-0000</h1>
        <p id="call-status" style="font-size:18px; margin-top:10px;">発信中...</p>
        <div class="call-tools">
            <div class="tool"><div class="tool-btn" id="mute-btn" onclick="mute()">M</div>消音</div>
            <div class="tool"><div class="tool-btn">:::</div>キーパッド</div>
            <div class="tool"><div class="tool-btn">S</div>スピーカー</div>
            <div class="tool"><div class="tool-btn">＋</div>通話を追加</div>
            <div class="tool"><div class="tool-btn">FT</div>FaceTime</div>
            <div class="tool"><div class="tool-btn">U</div>連絡先</div>
        </div>
        <div class="hangup-btn" onclick="hangup()"><div class="icon-phone-w"></div></div>
    </div>

    <div id="inc-overlay" class="call-overlay">
        <h1 id="inc-from" style="font-size:36px; font-weight:200">080-0000-0000</h1>
        <p style="font-size:18px; margin-top:10px;">JDD 携帯電話</p>
        <div class="slide-track">
            <div class="slide-text">スライドで応答</div>
            <div class="call-btn" id="knob" style="position:absolute; left:5px;"><div class="icon-phone-w"></div></div>
        </div>
    </div>
</div>

<script>
    // Firebase Config
    const config = { databaseURL: "https://my-call-14d70-default-rtdb.firebaseio.com" };
    firebase.initializeApp(config);
    const db = firebase.database();

    // Audio Context for DTMF
    let audioCtx;
    const dtmf = {'1':[697,1209],'2':[697,1336],'3':[697,1477],'4':[770,1209],'5':[770,1336],'6':[770,1477],'7':[852,1209],'8':[852,1336],'9':[852,1477],'*':[941,1209],'0':[941,1336],'#':[941,1477]};
    
    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playTone(d) {
        if(!audioCtx) return;
        const f = dtmf[d]; if(!f) return;
        const o1 = audioCtx.createOscillator(); const o2 = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o1.frequency.value = f[0]; o2.frequency.value = f[1]; g.gain.value = 0.1;
        o1.connect(g); o2.connect(g); g.connect(audioCtx.destination);
        o1.start(); o2.start(); setTimeout(()=>{o1.stop(); o2.stop();}, 150);
    }

    // Identity
    let myNum = localStorage.getItem('io9_num') || ("090-"+Math.floor(Math.random()*9000+1000)+"-"+Math.floor(Math.random()*9000+1000));
    localStorage.setItem('io9_num', myNum);
    const myId = myNum.replace(/-/g, '');

    // Dialing
    let dial = "";
    function press(n) {
        if(dial.length < 13) {
            dial += n; if(dial.length===3 || dial.length===8) dial+="-";
            document.getElementById('dial-string').innerText = dial;
            document.getElementById('back-btn').style.display = 'block';
            playTone(n);
        }
    }
    function del() {
        dial = dial.slice(0,-1); if(dial.endsWith('-')) dial=dial.slice(0,-1);
        document.getElementById('dial-string').innerText = dial;
        document.getElementById('back-btn').style.display = dial ? 'block' : 'none';
    }

    // Call Logic
    let timer;
    function call() {
        if(dial.length < 11) return;
        const target = dial.replace(/-/g, '');
        db.ref('calls/'+target).set({ from: myNum, status: 'ringing' });
        document.getElementById('call-target').innerText = dial;
        document.getElementById('call-overlay').style.display = 'flex';
        
        // 発信側もステータスを監視（相手が出たか）
        db.ref('calls/'+target).on('value', s => {
            const d = s.val();
            if(d && d.status === 'connected') startTimer();
            if(!d) hangup(); // 相手が切ったら自分も切る
        });
    }

    function hangup() {
        const target = dial.replace(/-/g, '');
        db.ref('calls/'+target).remove();
        db.ref('calls/'+myId).remove();
        document.getElementById('call-overlay').style.display = 'none';
        document.getElementById('inc-overlay').style.display = 'none';
        clearInterval(timer);
        document.getElementById('call-status').innerText = "発信中...";
    }

    function startTimer() {
        if(timer) return;
        let s = 0;
        timer = setInterval(() => {
            s++;
            let m = Math.floor(s/60);
            document.getElementById('call-status').innerText = (m<10?'0'+m:m)+":"+(s%60<10?'0'+s%60:s%60);
        }, 1000);
    }

    // Incoming Listener
    db.ref('calls/'+myId).on('value', s => {
        const d = s.val();
        if(d && d.status === 'ringing') {
            document.getElementById('inc-from').innerText = d.from;
            document.getElementById('inc-overlay').style.display = 'flex';
        } else if(!d) {
            document.getElementById('inc-overlay').style.display = 'none';
            clearInterval(timer);
        }
    });

    // Slider
    const knob = document.getElementById('knob');
    let drag = false;
    knob.onmousedown = knob.ontouchstart = () => drag = true;
    window.onmousemove = window.ontouchmove = (e) => {
        if(!drag) return;
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - knob.parentNode.getBoundingClientRect().left - 35;
        if(x > 0 && x < 205) knob.style.left = x + 'px';
        if(x >= 200) { drag = false; answer(); }
    };
    window.onmouseup = window.ontouchend = () => { drag = false; knob.style.left = '5px'; };

    function answer() {
        db.ref('calls/'+myId).update({ status: 'connected' });
        document.getElementById('inc-overlay').style.display = 'none';
        document.getElementById('call-target').innerText = document.getElementById('inc-from').innerText;
        document.getElementById('call-overlay').style.display = 'flex';
        startTimer();
    }

    // Contacts
    let contacts = JSON.parse(localStorage.getItem('contacts_io9') || '[]');
    function switchView(v) {
        document.getElementById('view-keypad').style.display = v==='keypad'?'flex':'none';
        document.getElementById('contact-view').style.display = v==='contact'?'block':'none';
        document.getElementById('tab-k').classList.toggle('active', v==='keypad');
        document.getElementById('tab-c').classList.toggle('active', v==='contact');
        if(v==='contact') renderContacts();
    }
    function addContact() {
        const n = prompt("名前:"); const p = prompt("番号:");
        if(n && p) { contacts.push({n,p}); localStorage.setItem('contacts_io9', JSON.stringify(contacts)); renderContacts(); }
    }
    function renderContacts() {
        document.getElementById('contact-list').innerHTML = contacts.map(c => `<div class="contact-item" onclick="dialFromContact('${c.p}')">${c.n}</div>`).join('');
    }
    function dialFromContact(p) { dial = p; document.getElementById('dial-string').innerText = dial; switchView('keypad'); }

    // Mute
    let muted = false;
    function mute() {
        muted = !muted;
        document.getElementById('mute-btn').classList.toggle('active', muted);
        // 実際にはここでマイクストリームを止める処理を追加可能
    }

    setInterval(() => {
        const d = new Date();
        document.getElementById('time').innerText = d.getHours() + ":" + String(d.getMinutes()).padStart(2, '0');
    }, 1000);
</script>
</body>
</html>
