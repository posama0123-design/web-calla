<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IP-callservice PRO</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --ios-blue: #007AFF; --ios-green: #4cd964; --ios-red: #ff3b30; --bg: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Helvetica Neue", Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); height: 100vh; width: 100vw; overflow: hidden; display: flex; justify-content: center; transition: 0.3s; }

        #phone-wrapper { width: 100%; max-width: 320px; height: 100vh; position: relative; display: flex; flex-direction: column; }

        /* 1. ステータスバーの完全水平整列 */
        .status-bar { 
            height: 20px; margin-top: 15px; padding: 0 12px;
            display: flex; justify-content: space-between; align-items: center; 
            font-size: 12px; font-weight: 600;
        }
        .status-left { display: flex; align-items: center; gap: 4px; height: 12px; }
        .antenna { display: flex; gap: 2px; align-items: flex-end; height: 10px; }
        .antenna div { width: 5px; height: 5px; background: #000; border-radius: 50%; }
        .antenna .off { background: #ccc; }
        .clock { line-height: 12px; }
        .battery { width: 22px; height: 10px; border: 1px solid #000; border-radius: 2px; position: relative; }
        .battery::after { content:''; position: absolute; right: -3px; top: 2px; width: 2px; height: 4px; background: #000; }

        #my-num { width: 100%; text-align: center; font-size: 11px; color: var(--ios-blue); margin-top: 8px; }

        /* Keypad layout */
        #dial-view { height: 80px; display: flex; align-items: center; justify-content: center; position: relative; }
        #dial-string { font-size: 36px; font-weight: 200; }
        .backspace { position: absolute; right: 20px; cursor: pointer; display: none; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px 25px; padding: 0 30px; }
        .key { width: 70px; height: 70px; border: 1px solid var(--ios-blue); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .key:active { background: rgba(0,122,255,0.15); }
        .key span { font-size: 34px; font-weight: 200; }
        .key small { font-size: 9px; margin-top: -4px; }

        .call-area { display: flex; justify-content: center; padding-top: 20px; }
        .call-btn { width: 72px; height: 72px; background: var(--ios-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* 通話中オーバーレイ（全画面） */
        .overlay { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; color: white; padding-top: 80px; z-index: 9999; }
        .call-tools { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px 40px; margin-top: 40px; }
        .tool { display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 11px; }
        .t-btn { width: 64px; height: 64px; border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* 精密CSSアイコン */
        .i-mute { width: 14px; height: 18px; border: 2px solid white; border-radius: 7px; position: relative; }
        .i-mute::after { content:''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%); width: 8px; height: 2px; background: white; }
        .i-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
        .i-keypad div { width: 5px; height: 5px; background: white; border-radius: 1px; }
        .i-speaker { width: 12px; height: 12px; background: white; position: relative; }
        .i-speaker::after { content:''; position: absolute; left: 8px; top: -6px; border-left: 15px solid white; border-top: 12px solid transparent; border-bottom: 12px solid transparent; }

        .hangup { width: 72px; height: 72px; background: var(--ios-red); border-radius: 50%; display: flex; align-items: center; justify-content: center; transform: rotate(135deg); margin-top: 80px; cursor: pointer; }
        
        /* 着信スライダー */
        .slider { width: 260px; height: 74px; background: rgba(255,255,255,0.2); border-radius: 37px; position: relative; display: flex; align-items: center; margin-top: 200px; overflow: hidden; }
        .slider-text { width: 100%; text-align: center; opacity: 0.8; padding-left: 40px; }
        
        .icon-p { width: 28px; height: 28px; background: white; clip-path: polygon(25% 5%, 40% 30%, 30% 40%, 60% 70%, 70% 60%, 95% 75%, 85% 95%, 50% 95%, 5% 50%, 5% 15%); }
    </style>
</head>
<body onclick="unlockAudio()">

<div id="phone-wrapper">
    <div class="status-bar">
        <div class="status-left">
            <div class="antenna"><div></div><div></div><div></div><div></div><div class="off"></div></div>
            <span>JDD</span>
        </div>
        <div class="clock" id="time">00:00</div>
        <div class="battery"><div style="width:20%; height:100%; background:var(--ios-red)"></div></div>
    </div>
    <div id="my-num">番号取得中...</div>

    <div id="dial-view">
        <div id="dial-string"></div>
        <div class="backspace" id="back-btn" onclick="del()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="#ccc"><path d="M22,3H7C6.31,3 5.5,3.5 5.12,4.1L1,12L5.12,19.9C5.5,20.5 6.31,21 7,21H22C23.1,21 24,20.1 24,19V5C24,3.9 23.1,3 22,3M19,15.59L17.59,17L14,13.41L10.41,17L9,15.59L12.59,12L9,8.41L10.41,7L14,10.59L17.59,7L19,8.41L15.41,12L19,15.59Z"/></svg>
        </div>
    </div>

    <div class="grid">
        <div class="key" onclick="press('1')"><span>1</span><small>&nbsp;</small></div>
        <div class="key" onclick="press('2')"><span>2</span><small>ABC</small></div>
        <div class="key" onclick="press('3')"><span>3</span><small>DEF</small></div>
        <div class="key" onclick="press('4')"><span>4</span><small>GHI</small></div>
        <div class="key" onclick="press('5')"><span>5</span><small>JKL</small></div>
        <div class="key" onclick="press('6')"><span>6</span><small>MNO</small></div>
        <div class="key" onclick="press('7')"><span>7</span><small>PQRS</small></div>
        <div class="key" onclick="press('8')"><span>8</span><small>TUV</small></div>
        <div class="key" onclick="press('9')"><span>9</span><small>WXYZ</small></div>
        <div class="key" onclick="press('*')"><span>*</span><small>&nbsp;</small></div>
        <div class="key" onclick="press('0')"><span>0</span><small>+</small></div>
        <div class="key" onclick="press('#')"><span>#</span><small>&nbsp;</small></div>
    </div>

    <div class="call-area">
        <div class="call-btn" onclick="makeCall()"><div class="icon-p"></div></div>
    </div>
</div>

<div id="call-ui" class="overlay" style="background: linear-gradient(180deg, #4a5a6a 0%, #000 100%);">
    <h1 id="call-name" style="font-size:36px; font-weight:200">...</h1>
    <p id="call-timer" style="font-size:18px; margin-top:10px;">発信中...</p>
    <div class="call-tools">
        <div class="tool"><div class="t-btn"><div class="i-mute"></div></div>消音</div>
        <div class="tool"><div class="t-btn"><div class="i-keypad"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div></div>キーパッド</div>
        <div class="tool"><div class="t-btn"><div class="i-speaker"></div></div>スピーカー</div>
        <div class="tool"><div class="t-btn">＋</div>通話追加</div>
        <div class="tool"><div class="t-btn">FT</div>FaceTime</div>
        <div class="tool"><div class="t-btn">人</div>連絡先</div>
    </div>
    <div class="hangup" onclick="hangup()"><div class="icon-p"></div></div>
</div>

<div id="inc-ui" class="overlay" style="background: linear-gradient(180deg, #2c3e50 0%, #000 100%);">
    <h1 id="inc-name" style="font-size:36px; font-weight:200">...</h1>
    <p style="font-size:18px; margin-top:10px;">JDD 携帯電話</p>
    <div class="slider">
        <div class="slider-text">スライドで応答</div>
        <div class="call-btn" id="knob" style="position:absolute; left:5px;"><div class="icon-p"></div></div>
    </div>
</div>

<script>
    const config = { databaseURL: "https://my-call-14d70-default-rtdb.firebaseio.com" };
    firebase.initializeApp(config);
    const db = firebase.database();

    // --- 音声合成エンジン (マイク不要・絶対鳴る) ---
    let audioCtx;
    const dtmf = { '1': [697, 1209], '2': [697, 1336], '3': [697, 1477], '4': [770, 1209], '5': [770, 1336], '6': [770, 1477], '7': [852, 1209], '8': [852, 1336], '9': [852, 1477], '0': [941, 1336], '*': [941, 1209], '#': [941, 1477] };

    function unlockAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playTone(key) {
        if (!audioCtx) return;
        const freq = dtmf[key];
        const osc1 = audioCtx.createOscillator(); const osc2 = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc1.frequency.value = freq[0]; osc2.frequency.value = freq[1];
        gain.gain.value = 0.1; gain.connect(audioCtx.destination);
        osc1.connect(gain); osc2.connect(gain);
        osc1.start(); osc2.start();
        setTimeout(() => { osc1.stop(); osc2.stop(); }, 150);
    }

    // --- Firebase ロジック ---
    let myNum = localStorage.getItem('IP_4S_NUM') || "090-" + Math.floor(Math.random()*9000+1000) + "-" + Math.floor(Math.random()*9000+1000);
    localStorage.setItem('IP_4S_NUM', myNum);
    document.getElementById('my-num').innerText = "自分の番号: " + myNum;
    const myId = myNum.replace(/-/g, '');

    let dial = "";
    function press(n) {
        if (dial.length < 13) {
            dial += n; if (dial.length===3 || dial.length===8) dial+="-";
            document.getElementById('dial-string').innerText = dial;
            document.getElementById('back-btn').style.display = 'block';
            playTone(n);
        }
    }
    function del() {
        dial = dial.slice(0,-1); if (dial.endsWith('-')) dial=dial.slice(0,-1);
        document.getElementById('dial-string').innerText = dial;
        document.getElementById('back-btn').style.display = dial ? 'block' : 'none';
    }

    let timer;
    function makeCall() {
        if (dial.length < 11) return;
        const target = dial.replace(/-/g, '');
        // 相手のノードに直接書き込む（通知）
        db.ref('calls/' + target).set({ from: myNum, status: 'ringing', timestamp: Date.now() });
        
        document.getElementById('call-name').innerText = dial;
        document.getElementById('call-ui').style.display = 'flex';
        
        // 自分の発信状態を監視
        db.ref('calls/' + target).on('value', snap => {
            const data = snap.val();
            if (data && data.status === 'connected') startTimer();
            if (!data) hangup();
        });
    }

    function hangup() {
        const target = dial.replace(/-/g, '');
        db.ref('calls/' + target).remove();
        db.ref('calls/' + myId).remove();
        document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
        clearInterval(timer);
        document.getElementById('call-timer').innerText = "発信中...";
    }

    function startTimer() {
        if (timer) return;
        let s = 0;
        timer = setInterval(() => {
            s++;
            let m = Math.floor(s/60);
            document.getElementById('call-timer').innerText = (m<10?'0'+m:m)+":"+(s%60<10?'0'+s%60:s%60);
        }, 1000);
    }

    // 着信リスナー
    db.ref('calls/' + myId).on('value', snap => {
        const data = snap.val();
        if (data && data.status === 'ringing') {
            document.getElementById('inc-name').innerText = data.from;
            document.getElementById('inc-ui').style.display = 'flex';
        } else if (!data) {
            document.getElementById('inc-ui').style.display = 'none';
        }
    });

    // スライダー
    const knob = document.getElementById('knob');
    let drag = false;
    knob.onmousedown = knob.ontouchstart = () => drag = true;
    window.onmousemove = window.ontouchmove = (e) => {
        if (!drag) return;
        const rect = knob.parentNode.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left - 35;
        if (x > 0 && x < 185) knob.style.left = x + 'px';
        if (x >= 180) { drag = false; answer(); }
    };
    window.onmouseup = window.ontouchend = () => { drag = false; knob.style.left = '5px'; };

    function answer() {
        db.ref('calls/' + myId).update({ status: 'connected' });
        document.getElementById('inc-ui').style.display = 'none';
        document.getElementById('call-name').innerText = document.getElementById('inc-name').innerText;
        document.getElementById('call-ui').style.display = 'flex';
        startTimer();
    }

    setInterval(() => {
        const d = new Date();
        document.getElementById('time').innerText = d.getHours() + ":" + String(d.getMinutes()).padStart(2, '0');
    }, 1000);
</script>
</body>
</html>
